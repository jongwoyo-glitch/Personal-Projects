<script type="module">
// T5 Tokenizer for accurate NAI V4/V4.5 token counting (~512 T5 tokens limit)
(async()=>{
  try{
    const{AutoTokenizer}=await import("https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.4.1/+esm");
    const tokenizer=await AutoTokenizer.from_pretrained("Xenova/flan-t5-small",{progress_callback:undefined});
    // Validate
    const test=tokenizer.encode("test");
    if(!test||test.length===0)throw new Error("encode returned empty");
    window._t5Tokenizer=tokenizer;
    window._t5Ready=true;
    console.log("[T5-Tokenizer] loaded OK, test='test' →",test.length,"tokens");
    window.dispatchEvent(new Event("t5-ready"));
  }catch(e){
    console.warn("[T5-Tokenizer] load failed, using fallback estimator:",e.message);
    window._t5Ready=false;
  }
})();
</script>

<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;
const G=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const LS="nai-pb-v4";const PK="nai-pb";const FS=!!window.showSaveFilePicker;
function ll(k,f){try{const v=localStorage.getItem(k);return v?JSON.parse(v):f}catch{return f}}
function ls(k,d){try{localStorage.setItem(k,JSON.stringify(d))}catch{}}

// ═══ T5 Token Counter (NAI V4/V4.5 uses T5 tokenizer, ~512 token limit) ═══
function countT5Tokens(text){
  if(!text||!text.trim())return 0;
  if(window._t5Tokenizer){
    try{
      const ids=window._t5Tokenizer.encode(text);
      // T5 tokenizer appends EOS token (id=1) — don't count it
      return Math.max(0,ids.length-1);
    }catch(e){console.warn("T5 encode error:",e)}
  }
  // Fallback: T5 averages ~3.5 chars/token for English tags/prompts
  // More conservative than 4 to avoid under-counting
  return Math.ceil(text.length/3.5);
}
function countChkTokens(chks,side,isChkActive,getChkPrompt){
  return chks.filter(c=>c.side===side&&isChkActive(c))
    .reduce((s,c)=>s+countT5Tokens(getChkPrompt(c)),0);
}

// IndexedDB for full-size image storage
const IDB_NAME="nai-pb-images";const IDB_STORE="images";
function idbOpen(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(IDB_NAME,1);
    req.onupgradeneeded=()=>req.result.createObjectStore(IDB_STORE);
    req.onsuccess=()=>res(req.result);
    req.onerror=()=>rej(req.error);
  });
}
async function idbPut(id,blob){
  try{const db=await idbOpen();const tx=db.transaction(IDB_STORE,"readwrite");tx.objectStore(IDB_STORE).put(blob,id);await new Promise(r=>{tx.oncomplete=r});db.close()}catch(e){console.warn("idbPut:",e)}
}
async function idbGet(id){
  try{const db=await idbOpen();const tx=db.transaction(IDB_STORE,"readonly");const req=tx.objectStore(IDB_STORE).get(id);return new Promise((res,rej)=>{req.onsuccess=()=>{db.close();res(req.result||null)};req.onerror=()=>{db.close();res(null)}})}catch(e){return null}
}
async function idbDel(id){
  try{const db=await idbOpen();const tx=db.transaction(IDB_STORE,"readwrite");tx.objectStore(IDB_STORE).delete(id);await new Promise(r=>{tx.oncomplete=r});db.close()}catch(e){}
}
async function idbClear(){
  try{const db=await idbOpen();const tx=db.transaction(IDB_STORE,"readwrite");tx.objectStore(IDB_STORE).clear();await new Promise(r=>{tx.oncomplete=r});db.close()}catch(e){}
}

// Character Preset DB (separate IDB store)
const CPDB_NAME="nai-pb-charpresets";const CPDB_STORE="presets";
function cpdbOpen(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(CPDB_NAME,1);
    req.onupgradeneeded=()=>req.result.createObjectStore(CPDB_STORE);
    req.onsuccess=()=>res(req.result);
    req.onerror=()=>rej(req.error);
  });
}
async function cpdbSave(id,charData){
  try{const db=await cpdbOpen();const tx=db.transaction(CPDB_STORE,"readwrite");tx.objectStore(CPDB_STORE).put(JSON.stringify(charData),id);await new Promise(r=>{tx.oncomplete=r});db.close()}catch(e){console.warn("cpdbSave:",e)}
}
async function cpdbGet(id){
  try{const db=await cpdbOpen();const tx=db.transaction(CPDB_STORE,"readonly");const req=tx.objectStore(CPDB_STORE).get(id);return new Promise((res)=>{req.onsuccess=()=>{db.close();res(req.result?JSON.parse(req.result):null)};req.onerror=()=>{db.close();res(null)}})}catch(e){return null}
}
async function cpdbDel(id){
  try{const db=await cpdbOpen();const tx=db.transaction(CPDB_STORE,"readwrite");tx.objectStore(CPDB_STORE).delete(id);await new Promise(r=>{tx.oncomplete=r});db.close()}catch(e){}
}
async function cpdbList(){
  try{const db=await cpdbOpen();const tx=db.transaction(CPDB_STORE,"readonly");const store=tx.objectStore(CPDB_STORE);
    return new Promise((res)=>{const keys=[];const req=store.openCursor();req.onsuccess=e=>{const c=e.target.result;if(c){keys.push({id:c.key,data:JSON.parse(c.value)});c.continue()}else{db.close();res(keys)}};req.onerror=()=>{db.close();res([])}})
  }catch(e){return[]}
}
// Export all presets as JSON file

// Base Preset DB (separate IDB store, mirrors Character Preset DB pattern)
const BPDB_NAME="nai-pb-basepresets";const BPDB_STORE="presets";
function bpdbOpen(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(BPDB_NAME,1);
    req.onupgradeneeded=()=>req.result.createObjectStore(BPDB_STORE);
    req.onsuccess=()=>res(req.result);
    req.onerror=()=>rej(req.error);
  });
}
async function bpdbSave(id,data){
  try{const db=await bpdbOpen();const tx=db.transaction(BPDB_STORE,"readwrite");tx.objectStore(BPDB_STORE).put(JSON.stringify(data),id);await new Promise(r=>{tx.oncomplete=r});db.close()}catch(e){console.warn("bpdbSave:",e)}
}
async function bpdbGet(id){
  try{const db=await bpdbOpen();const tx=db.transaction(BPDB_STORE,"readonly");const req=tx.objectStore(BPDB_STORE).get(id);return new Promise((res)=>{req.onsuccess=()=>{db.close();res(req.result?JSON.parse(req.result):null)};req.onerror=()=>{db.close();res(null)}})}catch(e){return null}
}
async function bpdbDel(id){
  try{const db=await bpdbOpen();const tx=db.transaction(BPDB_STORE,"readwrite");tx.objectStore(BPDB_STORE).delete(id);await new Promise(r=>{tx.oncomplete=r});db.close()}catch(e){}
}
async function bpdbList(){
  try{const db=await bpdbOpen();const tx=db.transaction(BPDB_STORE,"readonly");const store=tx.objectStore(BPDB_STORE);
    return new Promise((res)=>{const keys=[];const req=store.openCursor();req.onsuccess=e=>{const c=e.target.result;if(c){keys.push({id:c.key,data:JSON.parse(c.value)});c.continue()}else{db.close();res(keys)}};req.onerror=()=>{db.close();res([])}})
  }catch(e){return[]}
}

// WASM WebP encoder — script tag injection (no ESM import, no require)
let _webpModule=null;
let _webpLoadAttempted=false;
let _webpError=null;
const _webpDefaultOpts={quality:75,target_size:0,target_PSNR:0,method:4,sns_strength:50,filter_strength:60,
  filter_sharpness:0,filter_type:1,partitions:0,segments:4,pass:1,show_compressed:0,preprocessing:0,
  autofilter:0,partition_limit:0,alpha_compression:1,alpha_filtering:1,alpha_quality:100,lossless:0,
  exact:0,image_hint:0,emulate_jpeg_size:0,thread_level:0,low_memory:0,near_lossless:100,
  use_delta_palette:0,use_sharp_yuv:0};

async function _loadWebpEncoder(){
  const _v="?v=5";
  // 1. Fetch WASM binary
  const wasmResp=await fetch("./webp_enc.wasm"+_v);
  if(!wasmResp.ok)throw new Error("WASM fetch "+wasmResp.status);
  const wasmBinary=await wasmResp.arrayBuffer();
  // 2. Fetch glue JS and patch ESM→plain JS at runtime
  const jsResp=await fetch("./webp_enc.js"+_v);
  if(!jsResp.ok)throw new Error("JS fetch "+jsResp.status);
  let jsText=await jsResp.text();
  // Replace ESM-only syntax (safe: idempotent if already patched)
  jsText=jsText.replace(/import\.meta\.url/g,"location.href");
  jsText=jsText.replace(/export\s+default\s+Module\s*;?/g,"window.__webpEncFactory=Module;");
  // 3. Wrap in error capture + inject as inline script
  window.__webpEncError=null;
  jsText="try{"+jsText+"}catch(_e){window.__webpEncError=_e.message||String(_e)}";
  const s=document.createElement("script");
  s.textContent=jsText;
  document.head.appendChild(s);
  document.head.removeChild(s);
  if(window.__webpEncError)throw new Error("글루 실행 에러: "+window.__webpEncError);
  const factory=window.__webpEncFactory;
  if(!factory)throw new Error("팩토리 미정의 (글루 코드 구조 불일치)");
  delete window.__webpEncFactory;delete window.__webpEncError;
  // 4. Init with wasmBinary
  _webpModule=await factory({noInitialRun:true,wasmBinary});
  if(typeof _webpModule.encode!=="function")throw new Error("encode함수 없음");
}

async function wasmWebpBlob(canvas,quality=0.9){
  if(!_webpModule&&!_webpLoadAttempted){
    _webpLoadAttempted=true;
    try{await _loadWebpEncoder()}
    catch(e){_webpError=e.message;console.error("WebP WASM:",e)}
  }
  if(_webpModule){
    try{
      const ctx=canvas.getContext("2d");
      const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
      const opts={..._webpDefaultOpts,quality:Math.round(quality*100)};
      const result=_webpModule.encode(imageData.data,imageData.width,imageData.height,opts);
      if(!result)throw new Error("인코딩 결과 없음");
      return new Blob([result.buffer],{type:"image/webp"});
    }catch(e){console.error("WebP encode:",e)}
  }
  try{
    const blob=await new Promise(r=>canvas.toBlob(r,"image/webp",quality));
    if(blob&&blob.type==="image/webp")return blob;
  }catch{}
  return null;
}

// Universal file save — iPad: native share sheet, Desktop: File System Access or <a> fallback
async function saveBlob(blob,filename){
  // 1. Try File System Access API first (desktop Chrome/Edge → native save dialog)
  if(window.showSaveFilePicker){
    try{
      const ext=filename.split(".").pop()||"png";
      const types=[{description:ext.toUpperCase()+" Image",accept:{[blob.type]:["."+ext]}}];
      const handle=await window.showSaveFilePicker({suggestedName:filename,types});
      const w=await handle.createWritable();await w.write(blob);await w.close();
      return;
    }catch(e){if(e.name==="AbortError")return;console.warn("savePicker failed:",e)}
  }
  // 2. Try Web Share API (iPad/iOS → native share sheet with "Save to Files")
  if(navigator.share&&navigator.canShare){
    try{
      const file=new File([blob],filename,{type:blob.type});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file]});
        return;
      }
    }catch(e){if(e.name!=="AbortError")console.warn("share failed:",e)}
  }
  // 3. Fallback: <a download> — must append to DOM for some browsers
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=filename;a.style.display="none";
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(a.href)},5000);
}

const NAI_IMG="https://image.novelai.net/ai/generate-image";
const NAI_ENCODE_VIBE="https://image.novelai.net/ai/encode-vibe";
const NAI_SUB="https://api.novelai.net/user/subscription";
const UC_PRESET_0="nsfw, lowres, artistic error, film grain, scan artifacts, worst quality, bad quality, jpeg artifacts, very displeasing, chromatic aberration, dithering, halftone, screentone, multiple views, logo, too many watermarks, negative space, blank page";
const QUALITY_SUFFIX=", very aesthetic, masterpiece, no text";

// Encode vibe via NAI server (costs 2 Anlas per encode)
async function encodeVibeAPI(token,imageB64,informationExtracted,model){
  token=(token||"").trim();
  const b64=imageB64.replace(/^data:image\/[^;]+;base64,/,"");
  const payload={image:b64,information_extracted:informationExtracted,model:model||"nai-diffusion-4-5-full"};
  console.log("=== ENCODE-VIBE REQUEST ===","Model:",payload.model,"IE:",informationExtracted,"Image b64 len:",b64.length);
  const resp=await fetch(NAI_ENCODE_VIBE,{method:"POST",body:JSON.stringify(payload),headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"}});
  if(!resp.ok){const e=await resp.text();console.error("encode-vibe error:",resp.status,e);throw new Error("encode-vibe "+resp.status+": "+e.slice(0,200))}
  const buf=await resp.arrayBuffer();
  console.log("=== ENCODE-VIBE RESPONSE ===","status:",resp.status,"body:",buf.byteLength,"bytes");
  if(buf.byteLength===0)throw new Error("encode-vibe: empty response");
  // Convert binary response to base64 — this IS the encoded vibe
  const bytes=new Uint8Array(buf);
  let b64r="";
  const chunk=8192;
  for(let i=0;i<bytes.length;i+=chunk)b64r+=String.fromCharCode.apply(null,bytes.subarray(i,i+chunk));
  const encodedB64=btoa(b64r);
  console.log("Encoded vibe b64 length:",encodedB64.length,"(~"+(encodedB64.length/1024|0)+"KB)");
  return encodedB64;
}

async function fetchAnlas(token){
  token=(token||"").trim();
  if(!token)return null;
  try{
    const r=await fetch(NAI_SUB,{headers:{"Authorization":"Bearer "+token}});
    if(!r.ok){console.warn("NAI sub API error:",r.status);return{anlas:"err("+r.status+")",tier:0,active:false}}
    const d=await r.json();
    console.log("NAI /user/subscription response:",JSON.stringify(d).slice(0,2000));
    let a=null;
    if(d.trainingStepsLeft?.fixedTrainingStepsLeft!=null)a=d.trainingStepsLeft.fixedTrainingStepsLeft;
    else if(d.subscription?.trainingStepsLeft?.fixedTrainingStepsLeft!=null)a=d.subscription.trainingStepsLeft.fixedTrainingStepsLeft;
    else if(d.fixedTrainingStepsLeft!=null)a=d.fixedTrainingStepsLeft;
    if(a===null){const m=JSON.stringify(d).match(/"fixedTrainingStepsLeft"\s*:\s*(\d+)/);if(m)a=parseInt(m[1])}
    const tier=d.tier??d.subscription?.tier??0;
    const active=d.active??d.subscription?.active??false;
    return{anlas:a??0,tier,active,raw:d};
  }catch(e){
    console.warn("fetchAnlas:",e.message||e);
    const msg=e.message||"";
    if(msg.includes("Failed to fetch")||msg.includes("NetworkError"))
      return{anlas:"offline",tier:0,active:false};
    return{anlas:"err",tier:0,active:false,raw:{error:msg}}
  }
}

async function generateImage(token,se,basePos,baseNeg,charPrompts,vibeRefs,i2iOpts){
  token=token.trim();
  const seed=se.seed?parseInt(se.seed):Math.floor(Math.random()*4294967295);
  const negText=UC_PRESET_0+(baseNeg?", "+baseNeg:"");
  charPrompts=charPrompts||[];

  // V4.5: pipe syntax for multi-char
  let effectiveBasePos=basePos;
  let negAll=negText;
  if(charPrompts.length>0){
    effectiveBasePos=[basePos,...charPrompts.map(c=>c.pos)].filter(Boolean).join(" | ");
    negAll=[negText,...charPrompts.map(c=>c.neg).filter(Boolean)].join(", ");
  }

  const params={
    params_version:3,
    width:se.width,height:se.height,scale:se.scale,sampler:se.sampler,steps:se.steps,
    seed:seed,n_samples:1,ucPreset:0,qualityToggle:true,
    sm:se.smea||false,sm_dyn:se.smeaDyn||false,
    dynamic_thresholding:false,controlnet_strength:1,legacy:false,
    add_original_image:true,cfg_rescale:0,noise_schedule:"karras",
    legacy_v3_extend:false,skip_cfg_above_sigma:null,
    use_coords:false,
    characterPrompts:[],
    v4_prompt:{
      caption:{base_caption:effectiveBasePos,char_captions:[]},
      use_coords:false,use_order:true
    },
    v4_negative_prompt:{
      caption:{base_caption:negAll,char_captions:[]}
    },
    negative_prompt:negAll,
  };
  params._inputOverride=effectiveBasePos;

  // Vibe transfer (send pre-encoded vibe data from encode-vibe API)
  if(vibeRefs&&vibeRefs.length>0){
    params.reference_image_multiple=[];
    params.reference_strength_multiple=[];
    params.reference_information_extracted_multiple=[];
    for(const ref of vibeRefs){
      if(ref.encodedData){
        // Use pre-encoded vibe from /ai/encode-vibe (48KB vs 1.2MB raw)
        params.reference_image_multiple.push(ref.encodedData);
      }else{
        // Fallback: raw image (may cause 500 for large images)
        params.reference_image_multiple.push(ref.d.replace(/^data:image\/[^;]+;base64,/,""));
      }
      params.reference_strength_multiple.push(ref.s);
      params.reference_information_extracted_multiple.push(ref.ie);
    }
    params.normalize_reference_strength_multiple=true;
    console.log("=== VIBE TRANSFER ===");
    console.log("Count:",vibeRefs.length,"encoded:",vibeRefs.filter(r=>r.encodedData).length);
    console.log("Strengths:",params.reference_strength_multiple);
    console.log("IE:",params.reference_information_extracted_multiple);
    console.log("Data sizes:",params.reference_image_multiple.map(b=>(b.length/1024|0)+"KB"));
  }

  // img2img support
  if(i2iOpts){
    params.image=i2iOpts.image;
    params.strength=i2iOpts.strength||0.6;
    params.noise=i2iOpts.noise||0;
    params.extra_noise_seed=seed;
    params.autoSmea=false;
    params.deliberate_euler_ancestral_bug=false;
    params.prefer_brownian=true;
    params.color_correct=false;
    params.legacy_uc=false;
    if(params.v4_negative_prompt)params.v4_negative_prompt.legacy_uc=false;
  }

  let inputField=params._inputOverride||basePos;
  delete params._inputOverride;
  // qualityToggle: append quality suffix to input
  if(params.qualityToggle){
    inputField+=QUALITY_SUFFIX;
    if(params.v4_prompt)params.v4_prompt.caption.base_caption+=QUALITY_SUFFIX;
  }
  const action=i2iOpts?"img2img":"generate";
  const payload={input:inputField,model:se.model,action:action,parameters:params};

  console.log("=== NAI",action.toUpperCase(),"===");
  console.log("Model:",se.model,"Chars:",charPrompts.length);
  if(i2iOpts)console.log("Strength:",i2iOpts.strength,"Noise:",i2iOpts.noise,"ImgB64 len:",i2iOpts.image.length,"starts:",i2iOpts.image.slice(0,20));

  console.log("[NEGATIVE negative_prompt]:",params.negative_prompt?.slice(0,300)||"(none)");
  console.log("[NEGATIVE v4_neg.base_caption]:",params.v4_negative_prompt?.caption?.base_caption?.slice(0,300)||"(none)");
  if(params.v4_negative_prompt?.caption?.char_captions?.length>0)params.v4_negative_prompt.caption.char_captions.forEach((cc,i)=>console.log("[NEGATIVE char_neg_caption "+i+"]:",cc.char_caption?.slice(0,150)));
  console.log("[characterPrompts]:",JSON.stringify(params.characterPrompts?.map(c=>({p:c.prompt?.slice(0,50),uc:c.uc?.slice(0,50)}))));

  const url="https://image.novelai.net/ai/generate-image";

  if(!resp.ok){const e=await resp.text();throw new Error("NAI augment "+resp.status+": "+e.slice(0,200))}
  const blob=await resp.blob();
  try{const zip=await JSZip.loadAsync(blob);const f=Object.keys(zip.files);if(!f.length)throw 0;return URL.createObjectURL(await zip.files[f[0]].async("blob"))}
  catch(e){if(blob.type?.startsWith("image/"))return URL.createObjectURL(blob);throw new Error("응답 파싱 실패")}
}

// Local bg-removal via @imgly/background-removal (ONNX/WASM, free, no API)
async function localBgRemove(imgBlob,onProgress){
  if(!window._imglyRemoveBackground){
    onProgress&&onProgress("라이브러리 로딩 중...");
    try{
      const m=await import("https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/+esm");
      window._imglyRemoveBackground=m.default||m.removeBackground||m;
      console.log("[BG-Removal] loaded via dynamic import");
    }catch(e){
      console.error("[BG-Removal] load failed:",e);
      throw new Error("배경 제거 라이브러리 로드 실패. 페이지 새로고침 후 다시 시도해보세요.");
    }
  }
  const isolated=window.crossOriginIsolated;
  onProgress&&onProgress(isolated?"배경 분석 중...":"배경 분석 중... (싱글스레드, 1~2분 소요)");
  console.log("[BG-Removal] crossOriginIsolated:",isolated,"starting removal...");
  const result=await window._imglyRemoveBackground(imgBlob,{
    model:"isnet_quint8",
    output:{format:"image/png",type:"foreground"},
    progress:(key,current,total)=>{
      console.log("[BG-Removal] progress:",key,current,"/",total);
      if(total>0){
        const pct=Math.round(current/total*100);
        if(key.includes("fetch")||key.includes("download"))
          onProgress&&onProgress("모델 다운로드 "+pct+"%");
        else
          onProgress&&onProgress("처리 중 "+pct+"%");
      }
    }
  });
  return result;
}

function estimateAnlas(se,isOpus,vibeCount,action){
  action=action||"generate";
  const px=se.width*se.height;
  const steps=se.steps||28;
  const nSamples=1;
  const normalMaxPx=1024*1024;
  const isNormal=px<=normalMaxPx;
  const isSmall=px<=640*640;

  // Vibe Transfer: >4 vibes surcharge only (encoding fee is handled by encode-vibe API separately)
  let vibeSurcharge=0;
  if(vibeCount>4&&se.model&&se.model.includes("4"))vibeSurcharge=(vibeCount-4)*2;

  // Opus free conditions: txt2img only, 1 sample, ≤normal size, ≤28 steps
  if(isOpus&&action==="generate"&&nSamples===1&&isNormal&&steps<=28){
    if(vibeSurcharge>0)return{cost:vibeSurcharge,free:false,label:`~${vibeSurcharge} Anlas (바이브 초과 ${vibeSurcharge})`};
    return{cost:0,free:true,label:"FREE (Opus)"};
  }

  // Base cost: per-megapixel scaling
  const mpRatio=px/normalMaxPx;
  let baseCost;
  if(isSmall)baseCost=2;
  else if(isNormal)baseCost=Math.max(2,Math.ceil(mpRatio*5));
  else baseCost=Math.ceil(mpRatio*5);

  // Steps multiplier (28 is base)
  let stepMult=steps/28;
  if(stepMult<1)stepMult=1;
  let cost=Math.ceil(baseCost*stepMult);

  // SMEA surcharge (~30%)
  if(se.smea&&!se.smeaDyn)cost=Math.ceil(cost*1.3);
  if(se.smeaDyn)cost=Math.ceil(cost*1.5);

  // img2img / inpaint uses base image = not free for Opus
  if(action!=="generate")cost=Math.max(cost,5);

  // n_samples
  cost*=nSamples;

  const total=cost+vibeSurcharge;
  const parts=[];
  parts.push(`생성 ${cost}`);
  if(vibeSurcharge>0)parts.push(`바이브 초과 ${vibeSurcharge}`);

  return{cost:total,free:false,label:`~${total} Anlas (${parts.join(" + ")})`};
}

/* ── Color Wheel Picker ── */
function ColorWheel({color,onChange,onClose}){
  const wheelRef=useRef(null),svRef=useRef(null);
  const[hsv,sHsv]=useState(()=>{
    const r=parseInt(color.slice(1,3),16)/255,g=parseInt(color.slice(3,5),16)/255,b=parseInt(color.slice(5,7),16)/255;
    const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;
    let h=0;if(d>0){if(mx===r)h=((g-b)/d+6)%6;else if(mx===g)h=(b-r)/d+2;else h=(r-g)/d+4;h/=6}
    return{h,s:mx>0?d/mx:0,v:mx};
  });
  const hsv2hex=(h,s,v)=>{
    const i=Math.floor(h*6),f=h*6-i,p=v*(1-s),q=v*(1-f*s),t=v*(1-(1-f)*s);
    let r,g,b;switch(i%6){case 0:r=v;g=t;b=p;break;case 1:r=q;g=v;b=p;break;case 2:r=p;g=v;b=t;break;case 3:r=p;g=q;b=v;break;case 4:r=t;g=p;b=v;break;default:r=v;g=p;b=q}
    return"#"+[r,g,b].map(x=>Math.round(x*255).toString(16).padStart(2,"0")).join("");
  };
  const drawWheel=useCallback(()=>{
    const cv=wheelRef.current;if(!cv)return;
    const sz=cv.width,cx=sz/2,cy=sz/2,outerR=sz/2-2,innerR=sz/2-24;
    const ctx=cv.getContext("2d");ctx.clearRect(0,0,sz,sz);
    // Draw hue ring
    for(let a=0;a<360;a++){
      const rad=a*Math.PI/180;const rad2=(a+2)*Math.PI/180;
      ctx.beginPath();ctx.moveTo(cx+innerR*Math.cos(rad),cy+innerR*Math.sin(rad));
      ctx.lineTo(cx+outerR*Math.cos(rad),cy+outerR*Math.sin(rad));
      ctx.lineTo(cx+outerR*Math.cos(rad2),cy+outerR*Math.sin(rad2));
      ctx.lineTo(cx+innerR*Math.cos(rad2),cy+innerR*Math.sin(rad2));
      ctx.closePath();ctx.fillStyle=`hsl(${a},100%,50%)`;ctx.fill();
    }
    // Hue indicator
    const ha=hsv.h*Math.PI*2;const hx=cx+(innerR+12)*Math.cos(ha),hy=cy+(innerR+12)*Math.sin(ha);
    ctx.beginPath();ctx.arc(hx,hy,5,0,Math.PI*2);ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.stroke();
  },[hsv.h]);
  const drawSV=useCallback(()=>{
    const cv=svRef.current;if(!cv)return;
    const sz=cv.width;const ctx=cv.getContext("2d");
    // SV square
    for(let x=0;x<sz;x++){for(let y=0;y<sz;y++){
      const s=x/sz,v=1-y/sz;
      ctx.fillStyle=hsv2hex(hsv.h,s,v);ctx.fillRect(x,y,1,1);
    }}
    // SV indicator
    const ix=hsv.s*sz,iy=(1-hsv.v)*sz;
    ctx.beginPath();ctx.arc(ix,iy,6,0,Math.PI*2);ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.stroke();
    ctx.beginPath();ctx.arc(ix,iy,5,0,Math.PI*2);ctx.strokeStyle="#000";ctx.lineWidth=1;ctx.stroke();
  },[hsv]);
  useEffect(()=>{drawWheel()},[drawWheel]);
  useEffect(()=>{drawSV()},[drawSV]);

  const onWheelClick=(e)=>{
    const cv=wheelRef.current;if(!cv)return;
    const r=cv.getBoundingClientRect();
    const tt=e.touches?e.touches[0]:e;const cx=tt.clientX,cy=tt.clientY;
    const x=cx-r.left-cv.width/2,y=cy-r.top-cv.height/2;
    const dist=Math.sqrt(x*x+y*y),sz=cv.width/2;
    if(dist<sz-26){/* inside SV area, ignore */return}
    if(dist>sz)return;
    let h=Math.atan2(y,x)/(Math.PI*2);if(h<0)h+=1;
    const nw={...hsv,h};sHsv(nw);onChange(hsv2hex(nw.h,nw.s,nw.v));
  };
  const onSVClick=(e)=>{
    const cv=svRef.current;if(!cv)return;
    const r=cv.getBoundingClientRect();
    const tt=e.touches?e.touches[0]:e;const cx=tt.clientX,cy=tt.clientY;
    const s=Math.max(0,Math.min(1,(cx-r.left)/cv.width));
    const v=Math.max(0,Math.min(1,1-(cy-r.top)/cv.height));
    const nw={...hsv,s,v};sHsv(nw);onChange(hsv2hex(nw.h,nw.s,nw.v));
  };
  const wheelDrag=useRef(false),svDrag=useRef(false);
  const hexVal=hsv2hex(hsv.h,hsv.s,hsv.v);
  return(
  <div style={{position:"fixed",zIndex:10001,top:"50%",left:"50%",transform:"translate(-50%,-50%)",background:"#1a1428",borderRadius:12,padding:16,boxShadow:"0 8px 40px rgba(0,0,0,.6)",border:"1px solid rgba(90,180,255,.2)",display:"flex",flexDirection:"column",alignItems:"center",gap:10}} onClick={e=>e.stopPropagation()}>
    <div style={{position:"relative",width:200,height:200}}>
      <canvas ref={wheelRef} width={200} height={200} style={{position:"absolute",inset:0,cursor:"crosshair",touchAction:"none"}}
        onMouseDown={e=>{wheelDrag.current=true;onWheelClick(e)}}
        onMouseMove={e=>{if(wheelDrag.current)onWheelClick(e)}}
        onMouseUp={()=>{wheelDrag.current=false}}
        onMouseLeave={()=>{wheelDrag.current=false}}
        onTouchStart={e=>{e.preventDefault();wheelDrag.current=true;onWheelClick(e)}}
        onTouchMove={e=>{e.preventDefault();if(wheelDrag.current)onWheelClick(e)}}
        onTouchEnd={()=>{wheelDrag.current=false}}/>
      <canvas ref={svRef} width={100} height={100} style={{position:"absolute",top:50,left:50,width:100,height:100,cursor:"crosshair",borderRadius:2,touchAction:"none"}}
        onMouseDown={e=>{svDrag.current=true;onSVClick(e)}}
        onMouseMove={e=>{if(svDrag.current)onSVClick(e)}}
        onMouseUp={()=>{svDrag.current=false}}
        onMouseLeave={()=>{svDrag.current=false}}
        onTouchStart={e=>{e.preventDefault();svDrag.current=true;onSVClick(e)}}
        onTouchMove={e=>{e.preventDefault();if(svDrag.current)onSVClick(e)}}
        onTouchEnd={()=>{svDrag.current=false}}/>
    </div>
    <div style={{display:"flex",alignItems:"center",gap:8,width:"100%"}}>
      <div style={{width:32,height:32,borderRadius:6,background:hexVal,border:"2px solid rgba(255,255,255,.2)",flexShrink:0}}/>
      <input value={hexVal} onChange={e=>{const v=e.target.value;if(/^#[0-9a-fA-F]{6}$/.test(v)){onChange(v);
        const rr=parseInt(v.slice(1,3),16)/255,gg=parseInt(v.slice(3,5),16)/255,bb=parseInt(v.slice(5,7),16)/255;
        const mx=Math.max(rr,gg,bb),mn=Math.min(rr,gg,bb),d=mx-mn;
        let h=0;if(d>0){if(mx===rr)h=((gg-bb)/d+6)%6;else if(mx===gg)h=(bb-rr)/d+2;else h=(rr-gg)/d+4;h/=6}
        sHsv({h,s:mx>0?d/mx:0,v:mx})}
      }} style={{flex:1,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:6,padding:"6px 10px",color:"#ddd",fontSize:13,fontFamily:"monospace"}}/>
      <button onClick={onClose} style={{...Z.hB,fontSize:11,padding:"6px 12px"}}>확인</button>
    </div>
  </div>);
}

/* ── Inpaint Canvas Helpers ── */
const ipDrawing=useRef(false);
const ipLastPos=useRef(null);
// NAI-style grid-snapped block brush with real-time border
const IP_GRID=8;
const ipGridRef=useRef(null); // Uint8Array grid: 1=filled, 0=empty
const ipGridW=useRef(0);
const ipGridH=useRef(0);

const initIpCanvas=useCallback(()=>{
  const cv=ipCanvasRef.current;const img=ipImgRef.current;
  if(!cv||!img)return;
  cv.width=se.width;cv.height=se.height;
  const ctx=cv.getContext("2d");ctx.clearRect(0,0,cv.width,cv.height);
  const gw=Math.ceil(se.width/IP_GRID),gh=Math.ceil(se.height/IP_GRID);
  ipGridRef.current=new Uint8Array(gw*gh);
  ipGridW.current=gw;ipGridH.current=gh;
  ipHistoryRef.current=[];ipLastPos.current=null;
  sIpZoom(1);sIpPan({x:0,y:0});
  // Restore existing mask if available
  if(ipMaskB64){
    const maskImg=new Image();
    maskImg.onload=()=>{
      const tmp=document.createElement("canvas");tmp.width=se.width;tmp.height=se.height;
      const tctx=tmp.getContext("2d");
      tctx.drawImage(maskImg,0,0,se.width,se.height);
      const imgd=tctx.getImageData(0,0,se.width,se.height).data;
      const g=ipGridRef.current;
      // Sample center of each grid cell — if white (>127), mark as filled
      for(let gy=0;gy<gh;gy++){for(let gx=0;gx<gw;gx++){
        const px=Math.min(gx*IP_GRID+Math.floor(IP_GRID/2),se.width-1);
        const py=Math.min(gy*IP_GRID+Math.floor(IP_GRID/2),se.height-1);
        if(imgd[(py*se.width+px)*4]>127)g[gy*gw+gx]=1;
      }}
      ipRender();
    };
    maskImg.src="data:image/png;base64,"+ipMaskB64;
  }
},[se.width,se.height,ipMaskB64]);

useEffect(()=>{if(ipEdit&&baseImg)setTimeout(initIpCanvas,100)},[ipEdit,baseImg,initIpCanvas]);

// Inpaint spacebar pan + keyboard
useEffect(()=>{
  if(!ipEdit)return;
  const down=(e)=>{
    if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA")return;
    if(e.code==="Space"&&!e.repeat){e.preventDefault();ipSpaceRef.current=true;sIpSpaceHeld(true)}
    if((e.ctrlKey||e.metaKey)&&e.key==="z"){e.preventDefault();ipUndo()}
  };
  const up=(e)=>{
    if(e.code==="Space"){e.preventDefault();ipSpaceRef.current=false;sIpSpaceHeld(false);ipSpacePanRef.current=null}
  };
  window.addEventListener("keydown",down);
  window.addEventListener("keyup",up);
  return()=>{window.removeEventListener("keydown",down);window.removeEventListener("keyup",up);ipSpaceRef.current=false;sIpSpaceHeld(false)};
},[ipEdit]);

const getIpXY=(e)=>{
  const cv=ipCanvasRef.current;if(!cv)return{x:0,y:0};
  const r=cv.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return{x:(t.clientX-r.left)/r.width*cv.width,y:(t.clientY-r.top)/r.height*cv.height};
};
const ipSaveSnap=()=>{
  const g=ipGridRef.current;if(!g)return;
  ipHistoryRef.current.push(new Uint8Array(g));
  if(ipHistoryRef.current.length>30)ipHistoryRef.current.shift();
};

const ipRender=()=>{
  const cv=ipCanvasRef.current;const g=ipGridRef.current;
  if(!cv||!g)return;
  const ctx=cv.getContext("2d");
  const gw=ipGridW.current,gh=ipGridH.current,gs=IP_GRID;
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.imageSmoothingEnabled=false;
  const B=2; // border inset pixels
  for(let gy=0;gy<gh;gy++){for(let gx=0;gx<gw;gx++){
    if(!g[gy*gw+gx])continue;
    // Check 4 neighbors for border detection
    const up=gy>0&&g[(gy-1)*gw+gx];
    const dn=gy<gh-1&&g[(gy+1)*gw+gx];
    const lt=gx>0&&g[gy*gw+gx-1];
    const rt=gx<gw-1&&g[gy*gw+gx+1];
    const isBorder=!up||!dn||!lt||!rt;
    const px=gx*gs,py=gy*gs;
    if(isBorder){
      // Dark border for entire cell
      ctx.fillStyle="rgba(50,70,200,1)";
      ctx.fillRect(px,py,gs,gs);
      // Lighter fill inset only on non-edge sides
      const t=up?0:B,b=dn?0:B,l=lt?0:B,r=rt?0:B;
      if(gs-l-r>0&&gs-t-b>0){
        ctx.fillStyle="rgba(100,140,255,1)";
        ctx.fillRect(px+l,py+t,gs-l-r,gs-t-b);
      }
    }else{
      ctx.fillStyle="rgba(100,140,255,1)";
      ctx.fillRect(px,py,gs,gs);
    }
  }}
};

const ipStampGrid=(x,y,brushSize,erase)=>{
  const g=ipGridRef.current;if(!g)return;
  const gw=ipGridW.current,gh=ipGridH.current,gs=IP_GRID;
  const half=Math.floor(brushSize/2);
  const gx0=Math.max(0,Math.floor((Math.round(x)-half)/gs));
  const gy0=Math.max(0,Math.floor((Math.round(y)-half)/gs));
  const gx1=Math.min(gw,Math.ceil((Math.round(x)+half)/gs));
  const gy1=Math.min(gh,Math.ceil((Math.round(y)+half)/gs));
  const val=erase?0:1;
  for(let gy=gy0;gy<gy1;gy++){for(let gx=gx0;gx<gx1;gx++){g[gy*gw+gx]=val}}
  ipRender();
};
const ipStartDraw=(e)=>{
  // Spacebar + drag = pan
  if(ipSpaceRef.current&&!e.touches){
    e.preventDefault();
    ipSpacePanRef.current={startX:e.clientX,startY:e.clientY,panX:ipPan.x,panY:ipPan.y};
    const onMove=(ev)=>{
      ev.preventDefault();
      if(!ipSpacePanRef.current)return;
      sIpPan({x:ipSpacePanRef.current.panX+(ev.clientX-ipSpacePanRef.current.startX),
              y:ipSpacePanRef.current.panY+(ev.clientY-ipSpacePanRef.current.startY)});
    };
    const onUp=()=>{
      ipSpacePanRef.current=null;
      document.removeEventListener("mousemove",onMove);
      document.removeEventListener("mouseup",onUp);
    };
    document.addEventListener("mousemove",onMove);
    document.addEventListener("mouseup",onUp);
    return;
  }
  e.preventDefault();ipSaveSnap();ipDrawing.current=true;
  const p=getIpXY(e);ipLastPos.current=p;
  ipStampGrid(p.x,p.y,ipBrush,ipErase);
};
const ipDraw=(e)=>{
  e.preventDefault();if(!ipDrawing.current)return;
  const p=getIpXY(e);
  if(ipLastPos.current){
    const x0=Math.round(ipLastPos.current.x),y0=Math.round(ipLastPos.current.y);
    const x1=Math.round(p.x),y1=Math.round(p.y);
    const dx=Math.abs(x1-x0),dy=Math.abs(y1-y0);
    const dist=Math.max(dx,dy);
    const steps=Math.max(1,Math.ceil(dist/IP_GRID));
    for(let i=0;i<=steps;i++){
      const t=steps===0?0:i/steps;
      ipStampGrid(x0+(x1-x0)*t,y0+(y1-y0)*t,ipBrush,ipErase);
    }
  }
  ipLastPos.current=p;
};
const ipStopDraw=()=>{ipDrawing.current=false;ipLastPos.current=null};
const ipClear=()=>{const g=ipGridRef.current;if(g)g.fill(0);ipRender();ipHistoryRef.current=[]};
const ipUndo=()=>{
  const h=ipHistoryRef.current;
  if(h.length===0){if(ipGridRef.current)ipGridRef.current.fill(0)}
  else{const snap=h.pop();if(ipGridRef.current&&snap)ipGridRef.current.set(snap)}
  ipRender();
};

// Inpaint wheel zoom
const ipWheel=(e)=>{
  e.preventDefault();
  const factor=e.deltaY>0?0.9:1.1;
  const newZoom=Math.max(0.25,Math.min(5,ipZoom*factor));
  const scale=newZoom/ipZoom;
  const parent=e.currentTarget;const pr=parent.getBoundingClientRect();
  const ccx=pr.left+pr.width/2,ccy=pr.top+pr.height/2;
  const focalX=e.clientX-ccx-ipPan.x;
  const focalY=e.clientY-ccy-ipPan.y;
  sIpPan(p=>({x:p.x+focalX*(1-scale),y:p.y+focalY*(1-scale)}));
  sIpZoom(newZoom);
};

const getMaskB64=()=>{
  const g=ipGridRef.current;if(!g)return null;
  const w=se.width,h=se.height,gs=IP_GRID;
  const gw=ipGridW.current,gh=ipGridH.current;
  const out=document.createElement("canvas");out.width=w;out.height=h;
  const octx=out.getContext("2d");octx.imageSmoothingEnabled=false;
  // Black background
  octx.fillStyle="#000";octx.fillRect(0,0,w,h);
  // White = inpaint area
  octx.fillStyle="#fff";
  for(let gy=0;gy<gh;gy++){for(let gx=0;gx<gw;gx++){
    if(g[gy*gw+gx])octx.fillRect(gx*gs,gy*gs,gs,gs);
  }}
  return out.toDataURL("image/png").replace(/^data:image\/png;base64,/,"");
};
const getImgB64=async()=>{
  if(!genImg)return null;
  const resp=await fetch(genImg);const blob=await resp.blob();
  const img=new Image();const blobUrl=URL.createObjectURL(blob);
  await new Promise((res)=>{img.onload=res;img.src=blobUrl});
  const cv=document.createElement("canvas");cv.width=se.width;cv.height=se.height;
  cv.getContext("2d").drawImage(img,0,0,se.width,se.height);
  URL.revokeObjectURL(blobUrl);
  return cv.toDataURL("image/png").replace(/^data:[^;]+;base64,/,"");
};
const applyIpMask=()=>{
  const maskB64=getMaskB64();
  if(!maskB64){tw("⚠ 마스크를 그려주세요");return}
  sIPMaskB64(maskB64);
  // Create visual overlay with border from grid
  const g=ipGridRef.current;
  if(g){
    const w=se.width,h=se.height,gs=IP_GRID;
    const gw=ipGridW.current,gh=ipGridH.current;
    const vis=document.createElement("canvas");vis.width=w;vis.height=h;
    const vctx=vis.getContext("2d");vctx.imageSmoothingEnabled=false;
    const B=2;
    for(let gy=0;gy<gh;gy++){for(let gx=0;gx<gw;gx++){
      if(!g[gy*gw+gx])continue;
      const up=gy>0&&g[(gy-1)*gw+gx];
      const dn=gy<gh-1&&g[(gy+1)*gw+gx];
      const lt=gx>0&&g[gy*gw+gx-1];
      const rt=gx<gw-1&&g[gy*gw+gx+1];
      const isBorder=!up||!dn||!lt||!rt;
      const px=gx*gs,py=gy*gs;
      if(isBorder){
        vctx.fillStyle="rgba(50,70,200,0.7)";
        vctx.fillRect(px,py,gs,gs);
        const t=up?0:B,b=dn?0:B,l=lt?0:B,r=rt?0:B;
        if(gs-l-r>0&&gs-t-b>0){
          vctx.fillStyle="rgba(100,140,255,0.3)";
          vctx.fillRect(px+l,py+t,gs-l-r,gs-t-b);
        }
      }else{
        vctx.fillStyle="rgba(100,140,255,0.3)";
        vctx.fillRect(px,py,gs,gs);
      }
    }}
    sIPMaskUrl(vis.toDataURL("image/png"));
  }
  sIPE(false);
  tw("마스크 적용됨 — 생성 버튼으로 인페인트");
};

  const ctx=cv.getContext("2d");
  cv.width=se.width;cv.height=se.height;
  ctx.clearRect(0,0,cv.width,cv.height);

  if(editStrokeCanvas.current&&editDrawing.current){
    if(editTransparent&&editTool!=="bgremove"){
      ctx.globalCompositeOperation="destination-out";
    }
    ctx.globalAlpha=(editTool==="bgremove")?0.35:editOpacity;
    ctx.drawImage(editStrokeCanvas.current,0,0);
    ctx.globalAlpha=1;ctx.globalCompositeOperation="source-over";
  }
  // Selection mask overlay: darken non-selected areas
  if(editSel){
    const w=cv.width,h=cv.height;
    const ov=document.createElement("canvas");ov.width=w;ov.height=h;
    const oCtx=ov.getContext("2d");
    // Fill entire overlay with semi-transparent black
    oCtx.fillStyle="rgba(0,0,0,0.45)";
    oCtx.fillRect(0,0,w,h);
    // Punch out selected pixels (make them transparent)
    const ovD=oCtx.getImageData(0,0,w,h);
    const dd=ovD.data;
    for(let i=0;i<w*h;i++){if(editSel[i])dd[i*4+3]=0;}
    oCtx.putImageData(ovD,0,0);
    ctx.drawImage(ov,0,0);
  }
};

};

// Magic Wand: get composite image data for analysis
const getCompositeImageData=()=>{
  const tmp=document.createElement("canvas");tmp.width=se.width;tmp.height=se.height;
  const tctx=tmp.getContext("2d");
  drawAllLayers(tctx);
  return tctx.getImageData(0,0,se.width,se.height);
};

// Magic Wand: flood fill selection
const doWandSelect=(px,py,mode)=>{
  // mode: "replace" (default), "add" (Shift), "subtract" (Alt)
  mode=mode||"replace";
  const w=se.width,h=se.height;
  const id=getCompositeImageData();
  const d=id.data;
  const sx=Math.max(0,Math.min(w-1,Math.round(px)));
  const sy=Math.max(0,Math.min(h-1,Math.round(py)));
  const si=(sy*w+sx)*4;
  const tr=d[si],tg=d[si+1],tb=d[si+2],ta=d[si+3];
  const tol=wandTol;
  const newMask=new Uint8Array(w*h);
  const match=(i)=>{
    const dr=d[i]-tr,dg=d[i+1]-tg,db=d[i+2]-tb,da=d[i+3]-ta;
    return Math.sqrt(dr*dr+dg*dg+db*db+da*da)<=tol;
  };
  if(wandContig){
    // BFS flood fill from click point
    const q=[sx+sy*w];const visited=new Uint8Array(w*h);
    visited[sx+sy*w]=1;newMask[sx+sy*w]=1;
    while(q.length>0){
      const idx=q.pop();const ix=idx%w,iy=(idx-ix)/w;
      const nb=[];
      if(ix>0)nb.push(idx-1);if(ix<w-1)nb.push(idx+1);
      if(iy>0)nb.push(idx-w);if(iy<h-1)nb.push(idx+w);
      for(const ni of nb){if(!visited[ni]){visited[ni]=1;if(match(ni*4)){newMask[ni]=1;q.push(ni)}}}
    }
  }else{
    // Global: select all pixels matching color within tolerance
    for(let i=0;i<w*h;i++){if(match(i*4))newMask[i]=1}
  }
  mergeSelMask(newMask,mode);
};

// Merge a new mask into editSel based on mode (shared by all sub-tools)
const mergeSelMask=(newMask,mode)=>{
  const w=se.width,h=se.height;
  let finalMask;
  if(mode==="add"&&editSel){
    finalMask=new Uint8Array(w*h);
    for(let i=0;i<w*h;i++)finalMask[i]=editSel[i]||newMask[i]?1:0;
  }else if(mode==="subtract"&&editSel){
    finalMask=new Uint8Array(editSel);
    for(let i=0;i<w*h;i++){if(newMask[i])finalMask[i]=0}
  }else{
    finalMask=newMask;
  }
  sEditSel(finalMask);rebuildSelPath(finalMask);
};

// Lasso: fill polygon into mask
const completeLasso=(mode)=>{
  const pts=lassoPoints.current;
  if(pts.length<3){lassoPoints.current=[];return}
  const w=se.width,h=se.height;
  const mask=new Uint8Array(w*h);
  // Rasterize polygon using scanline fill
  const tmp=document.createElement("canvas");tmp.width=w;tmp.height=h;
  const ctx=tmp.getContext("2d");
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
  ctx.closePath();ctx.fillStyle="#fff";ctx.fill();
  const imgd=ctx.getImageData(0,0,w,h).data;
  for(let i=0;i<w*h;i++){if(imgd[i*4+3]>127)mask[i]=1}
  lassoPoints.current=[];
  mergeSelMask(mask,mode);
};

// Brush selection: stamp circle into mask
const selWorkingMask=useRef(null); // Uint8Array — working mask during brush selection stroke

const stampSelBrush=(x,y,brushSize,mode)=>{
  const w=se.width,h=se.height;
  const r=Math.max(1,Math.floor(brushSize/2));
  const cx=Math.round(x),cy=Math.round(y);
  // Initialize working mask on first call of a stroke
  if(!selWorkingMask.current)selWorkingMask.current=editSel?new Uint8Array(editSel):new Uint8Array(w*h);
  const mask=selWorkingMask.current;
  for(let dy=-r;dy<=r;dy++){for(let dx=-r;dx<=r;dx++){
    if(dx*dx+dy*dy>r*r)continue;
    const px=cx+dx,py=cy+dy;
    if(px>=0&&px<w&&py>=0&&py<h)mask[py*w+px]=mode==="subtract"?0:1;
  }}
  sEditSel(new Uint8Array(mask));rebuildSelPath(mask);
};

// Rebuild cached Path2D from mask
const rebuildSelPath=(mask)=>{
  const w=se.width,h=se.height;
  const path=new Path2D();
  for(let y=0;y<h;y++){
    let rs=-1;
    for(let x=0;x<=w;x++){
      const sel=x<w&&mask[y*w+x];
      if(sel&&rs<0)rs=x;
      if(!sel&&rs>=0){path.rect(rs,y,x-rs,1);rs=-1;}
    }
  }
  editSelPath.current=path;
};

// Expand selection by N pixels (morphological dilation via BFS)
const expandSelection=(n)=>{
  if(!editSel||n<=0)return;
  const w=se.width,h=se.height;
  const mask=new Uint8Array(editSel);
  // BFS from all currently-selected edge pixels
  const dist=new Int16Array(w*h);dist.fill(-1);
  const q=[];
  for(let y=0;y<h;y++){for(let x=0;x<w;x++){
    const idx=y*w+x;
    if(!mask[idx])continue;
    // Check if edge (has at least one unselected neighbor)
    const isEdge=(x===0||!mask[idx-1])||(x===w-1||!mask[idx+1])||(y===0||!mask[idx-w])||(y===h-1||!mask[idx+w]);
    if(isEdge){dist[idx]=0;q.push(idx);}
  }}
  let qi=0;
  while(qi<q.length){
    const idx=q[qi++];
    const d=dist[idx];if(d>=n)continue;
    const ix=idx%w,iy=(idx-ix)/w;
    const nb=[];
    if(ix>0)nb.push(idx-1);if(ix<w-1)nb.push(idx+1);
    if(iy>0)nb.push(idx-w);if(iy<h-1)nb.push(idx+w);
    for(const ni of nb){
      if(!mask[ni]&&dist[ni]<0){
        dist[ni]=d+1;mask[ni]=1;q.push(ni);
      }
    }
  }
  sEditSel(mask);rebuildSelPath(mask);
};

// Shrink selection by N pixels (morphological erosion via BFS inward)
const shrinkSelection=(n)=>{
  if(!editSel||n<=0)return;
  const w=se.width,h=se.height;
  const mask=new Uint8Array(editSel);
  // BFS inward from edges of selection
  const dist=new Int16Array(w*h);dist.fill(-1);
  const q=[];
  for(let y=0;y<h;y++){for(let x=0;x<w;x++){
    const idx=y*w+x;
    if(!mask[idx])continue;
    const isEdge=(x===0||!mask[idx-1])||(x===w-1||!mask[idx+1])||(y===0||!mask[idx-w])||(y===h-1||!mask[idx+w]);
    if(isEdge){dist[idx]=0;q.push(idx);}
  }}
  let qi=0;
  while(qi<q.length){
    const idx=q[qi++];
    const d=dist[idx];
    if(d<n)mask[idx]=0; // Remove edge pixels within shrink range
    if(d>=n-1)continue;
    const ix=idx%w,iy=(idx-ix)/w;
    const nb=[];
    if(ix>0)nb.push(idx-1);if(ix<w-1)nb.push(idx+1);
    if(iy>0)nb.push(idx-w);if(iy<h-1)nb.push(idx+w);
    for(const ni of nb){
      if(mask[ni]&&dist[ni]<0){
        dist[ni]=d+1;q.push(ni);
      }
    }
  }
  sEditSel(mask);rebuildSelPath(mask);
};

// Invert selection
const invertSelection=()=>{
  if(!editSel)return;
  const w=se.width,h=se.height;
  const mask=new Uint8Array(w*h);
  for(let i=0;i<w*h;i++)mask[i]=editSel[i]?0:1;
  sEditSel(mask);rebuildSelPath(mask);
};

// Fill selection with current color (or clear if transparent)
const fillSelection=()=>{
  if(!editSel)return;
  const acv=getActiveCanvas();if(!acv)return;
  editSaveSnap();
  const ctx=acv.getContext("2d");
  const w=se.width,h=se.height;
  const imgd=ctx.getImageData(0,0,w,h);
  const dd=imgd.data;
  if(editTransparent){
    // Transparent fill: reduce alpha by opacity amount
    const removeAlpha=Math.round(editOpacity*255);
    for(let i=0;i<w*h;i++){
      if(editSel[i]){dd[i*4+3]=Math.max(0,dd[i*4+3]-removeAlpha)}
    }
  }else{
    // Parse hex color
    const hex=editColor.replace("#","");
    const cr=parseInt(hex.slice(0,2),16),cg=parseInt(hex.slice(2,4),16),cb=parseInt(hex.slice(4,6),16);
    const alpha=Math.round(editOpacity*255);
    for(let i=0;i<w*h;i++){
      if(editSel[i]){
        const p=i*4;
        // Alpha compositing
        const sa=alpha/255;
        dd[p]=Math.round(dd[p]*(1-sa)+cr*sa);
        dd[p+1]=Math.round(dd[p+1]*(1-sa)+cg*sa);
        dd[p+2]=Math.round(dd[p+2]*(1-sa)+cb*sa);
        dd[p+3]=Math.min(255,dd[p+3]+alpha);
      }
    }
  }
  ctx.putImageData(imgd,0,0);
  compositeEdit();
};

const editSaveSnap=()=>{
  const acv=getActiveCanvas();if(!acv)return;
  const data=acv.getContext("2d",{willReadFrequently:true}).getImageData(0,0,acv.width,acv.height);
  editHistoryRef.current.push({layerId:editActiveLayer,data});
  if(editHistoryRef.current.length>50)editHistoryRef.current.shift();
};

// Ctrl+Alt drag brush resize
const brushResizing=useRef(null);
const[brushPreview,sBrushPreview]=useState(null);

// Eyedropper helper
const doEyedrop=(e)=>{
  const{x,y}=getEditXY(e);
  const tmp=document.createElement("canvas");tmp.width=se.width;tmp.height=se.height;
  const tctx=tmp.getContext("2d");
  drawAllLayers(tctx);
  const px=tctx.getImageData(Math.max(0,Math.min(se.width-1,Math.round(x))),Math.max(0,Math.min(se.height-1,Math.round(y))),1,1).data;
  const hex="#"+[px[0],px[1],px[2]].map(v=>v.toString(16).padStart(2,"0")).join("");
  sEditColor(hex);sEditTransparent(false);tw("색상 추출: "+hex);
};

const editStartDraw=(e)=>{
  // Right-click = eyedropper (desktop)
  if(e.button===2){e.preventDefault();doEyedrop(e);return}
  // Spacebar + drag = pan (desktop)
  if(spaceHeldRef.current&&!e.touches){
    e.preventDefault();
    const t=e;
    spacePanRef.current={startX:t.clientX,startY:t.clientY,panX:editPan.x,panY:editPan.y};
    const onMove=(ev)=>{
      ev.preventDefault();
      if(!spacePanRef.current)return;
      const dx=ev.clientX-spacePanRef.current.startX;
      const dy=ev.clientY-spacePanRef.current.startY;
      sEditPan({x:spacePanRef.current.panX+dx,y:spacePanRef.current.panY+dy});
    };
    const onUp=()=>{
      spacePanRef.current=null;
      document.removeEventListener("mousemove",onMove);
      document.removeEventListener("mouseup",onUp);
    };
    document.addEventListener("mousemove",onMove);
    document.addEventListener("mouseup",onUp);
    return;
  }
  // Command/Ctrl + click = eyedropper (iPad keyboard / desktop)
  if((e.metaKey||e.ctrlKey)&&!e.altKey){
    e.preventDefault();doEyedrop(e);return;
  }
  // Ctrl+Alt drag = brush resize (mouse + touch/pencil)
  if((e.ctrlKey||e.metaKey)&&e.altKey){
    e.preventDefault();
    const parent=editWrapRef.current?.parentElement;
    const pr=parent?.getBoundingClientRect();
    const t=e.touches?e.touches[0]:e;
    const anchorX=t.clientX-(pr?.left||0);
    const anchorY=t.clientY-(pr?.top||0);
    brushResizing.current={startX:t.clientX,startSize:editBrush};
    sBrushPreview({x:anchorX,y:anchorY,size:editBrush});
    const onMove=(ev)=>{
      ev.preventDefault&&ev.preventDefault();
      const p=ev.touches?ev.touches[0]:ev;
      if(!p)return;
      const dx=p.clientX-brushResizing.current.startX;
      const ns=Math.max(1,Math.min(400,brushResizing.current.startSize+Math.round(dx/2)));
      sEditBrush(ns);sBrushPreview({x:anchorX,y:anchorY,size:ns});
    };
    const onUp=()=>{brushResizing.current=null;sBrushPreview(null);
      document.removeEventListener("mousemove",onMove);document.removeEventListener("mouseup",onUp);
      document.removeEventListener("touchmove",onMove);document.removeEventListener("touchend",onUp);
    };
    document.addEventListener("mousemove",onMove);document.addEventListener("mouseup",onUp);
    document.addEventListener("touchmove",onMove,{passive:false});document.addEventListener("touchend",onUp);
    return;
  }
  if(e.touches&&e.touches.length===2){e.preventDefault();editUndo();return}
  if(e.touches&&e.touches.length>1)return;
  e.preventDefault();
  if(editTool==="eyedropper"){
    doEyedrop(e);sEditTool("brush");
    return;
  }
  if(editTool==="wand"){
    const{x,y}=getEditXY(e);
    const mode=e.shiftKey?"add":e.altKey?"subtract":"replace";
    if(wandSub==="color"){
      doWandSelect(x,y,mode);
      return;
    }
    if(wandSub==="lasso"){
      // Start collecting lasso points
      lassoPoints.current=[{x,y}];
      const lassoMode=mode;
      const onMove=(ev)=>{
        ev.preventDefault();
        const p=getEditXY(ev);
        lassoPoints.current.push(p);
        // Draw lasso preview on display canvas
        compositeEdit();
        const cv=editCanvasRef.current;if(!cv)return;
        const ctx=cv.getContext("2d");
        const pts=lassoPoints.current;if(pts.length<2)return;
        ctx.save();ctx.strokeStyle="rgba(90,180,255,.8)";ctx.lineWidth=1.5/editZoom;
        ctx.setLineDash([4/editZoom,4/editZoom]);ctx.lineJoin="round";
        ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
        for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
        ctx.stroke();
        // Closing line (dashed, lighter)
        ctx.strokeStyle="rgba(90,180,255,.4)";
        ctx.beginPath();ctx.moveTo(pts[pts.length-1].x,pts[pts.length-1].y);ctx.lineTo(pts[0].x,pts[0].y);ctx.stroke();
        ctx.restore();
      };
      const onUp=()=>{
        completeLasso(lassoMode);
        document.removeEventListener("mousemove",onMove);
        document.removeEventListener("mouseup",onUp);
        document.removeEventListener("touchmove",onMove);
        document.removeEventListener("touchend",onUp);
      };
      document.addEventListener("mousemove",onMove);
      document.addEventListener("mouseup",onUp);
      document.addEventListener("touchmove",onMove,{passive:false});
      document.addEventListener("touchend",onUp);
      return;
    }
    if(wandSub==="brush"){
      // Brush-based selection painting
      const selMode=mode;
      // For replace mode, clear existing selection first
      if(selMode==="replace"){sEditSel(null);editSelPath.current=null;selWorkingMask.current=null}
      // Init working mask for this stroke
      selWorkingMask.current=editSel?new Uint8Array(editSel):new Uint8Array(se.width*se.height);
      selDrawing.current=true;selLastPos.current={x,y};
      stampSelBrush(x,y,selBrushSize,selMode==="subtract"?"subtract":"add");
      const onMove=(ev)=>{
        ev.preventDefault();
        if(!selDrawing.current)return;
        const p=getEditXY(ev);
        if(selLastPos.current){
          const x0=selLastPos.current.x,y0=selLastPos.current.y;
          const dx=p.x-x0,dy=p.y-y0;
          const dist=Math.sqrt(dx*dx+dy*dy);
          const step=Math.max(2,selBrushSize/4);
          const steps=Math.max(1,Math.ceil(dist/step));
          for(let i=1;i<=steps;i++){
            const t=i/steps;
            stampSelBrush(x0+dx*t,y0+dy*t,selBrushSize,selMode==="subtract"?"subtract":"add");
          }
        }
        selLastPos.current=p;
        compositeEdit();
      };
      const onUp=()=>{
        selDrawing.current=false;selLastPos.current=null;
        selWorkingMask.current=null; // Release working mask
        compositeEdit();
        document.removeEventListener("mousemove",onMove);
        document.removeEventListener("mouseup",onUp);
        document.removeEventListener("touchmove",onMove);
        document.removeEventListener("touchend",onUp);
      };
      document.addEventListener("mousemove",onMove);
      document.addEventListener("mouseup",onUp);
      document.addEventListener("touchmove",onMove,{passive:false});
      document.addEventListener("touchend",onUp);
      return;
    }
    return;
  }
  editSaveSnap();editDrawing.current=true;editDoDraw(e);
  // Attach window-level listeners so drawing continues outside canvas
  window.addEventListener("mousemove",editDoDraw);
  window.addEventListener("mouseup",editStopDraw);
};

const editDoDraw=(e)=>{
  e.preventDefault();if(!editDrawing.current)return;
  const acv=getActiveCanvas();if(!acv)return;
  const{x,y}=getEditXY(e);

  if(editTool==="blur"){
    const ctx=acv.getContext("2d");
    const sp=editSelPath.current;
    if(sp){ctx.save();ctx.clip(sp)}
    const r=Math.max(2,Math.floor(editBrush/2));
    const sr=Math.max(1,Math.floor(editBlurStr));
    const tmp=document.createElement("canvas");tmp.width=se.width;tmp.height=se.height;
    const tctx=tmp.getContext("2d");
    drawAllLayers(tctx);
    const ix=Math.max(0,Math.round(x)-r),iy=Math.max(0,Math.round(y)-r);
    const iw=Math.min(r*2,se.width-ix),ih=Math.min(r*2,se.height-iy);
    if(iw<=0||ih<=0){if(sp)ctx.restore();return}
    const sm=document.createElement("canvas");sm.width=Math.max(1,Math.round(iw/sr));sm.height=Math.max(1,Math.round(ih/sr));
    sm.getContext("2d").drawImage(tmp,ix,iy,iw,ih,0,0,sm.width,sm.height);
    ctx.globalCompositeOperation="source-over";ctx.globalAlpha=0.7;
    ctx.drawImage(sm,0,0,sm.width,sm.height,ix,iy,iw,ih);
    ctx.globalAlpha=1;
    if(sp)ctx.restore();
  }else{
    // All other tools: draw to stroke canvas for uniform opacity
    if(!editStrokeCanvas.current){
      editStrokeCanvas.current=document.createElement("canvas");
      editStrokeCanvas.current.width=se.width;editStrokeCanvas.current.height=se.height;
    }
    const sctx=editStrokeCanvas.current.getContext("2d");
    if(editTool==="eraser"){
      // Eraser draws directly to layer
      const ctx=acv.getContext("2d");
      const sp=editSelPath.current;
      if(sp){ctx.save();ctx.clip(sp)}
      ctx.globalCompositeOperation="destination-out";ctx.globalAlpha=1;
      ctx.lineWidth=editBrush;ctx.lineCap="round";ctx.lineJoin="round";
      if(editLastPos.current){ctx.beginPath();ctx.moveTo(editLastPos.current.x,editLastPos.current.y);ctx.lineTo(x,y);ctx.stroke()}
      else{ctx.beginPath();ctx.arc(x,y,editBrush/2,0,Math.PI*2);ctx.fill()}
      if(sp)ctx.restore();
    }else if(editTool==="bgremove"){
      sctx.globalCompositeOperation="source-over";sctx.globalAlpha=1;
      sctx.strokeStyle="#00ff88";sctx.fillStyle="#00ff88";
      sctx.lineWidth=editBrush;sctx.lineCap="round";sctx.lineJoin="round";
      if(editLastPos.current){sctx.beginPath();sctx.moveTo(editLastPos.current.x,editLastPos.current.y);sctx.lineTo(x,y);sctx.stroke()}
      else{sctx.beginPath();sctx.arc(x,y,editBrush/2,0,Math.PI*2);sctx.fill()}
    }else{
      // Brush: draw at full opacity to stroke canvas
      const sp=editSelPath.current;
      if(sp){sctx.save();sctx.clip(sp)}
      sctx.globalCompositeOperation="source-over";sctx.globalAlpha=1;
      const bCol=editTransparent?"#ffffff":editColor;
      sctx.strokeStyle=bCol;sctx.fillStyle=bCol;
      sctx.lineWidth=editBrush;sctx.lineCap="round";sctx.lineJoin="round";
      if(editLastPos.current){sctx.beginPath();sctx.moveTo(editLastPos.current.x,editLastPos.current.y);sctx.lineTo(x,y);sctx.stroke()}
      else{sctx.beginPath();sctx.arc(x,y,editBrush/2,0,Math.PI*2);sctx.fill()}
      if(sp)sctx.restore();
    }
  }
  editLastPos.current={x,y};
  compositeEdit();
};

const editStopDraw=()=>{
  // Remove window-level listeners
  window.removeEventListener("mousemove",editDoDraw);
  window.removeEventListener("mouseup",editStopDraw);
  // On stroke end: composite stroke canvas onto active layer with opacity
  if(editDrawing.current&&editStrokeCanvas.current&&editTool!=="eraser"&&editTool!=="blur"){
    const acv=getActiveCanvas();
    if(acv){
      const ctx=acv.getContext("2d");
      ctx.globalCompositeOperation=(editTransparent&&editTool!=="bgremove")?"destination-out":"source-over";
      ctx.globalAlpha=(editTool==="bgremove")?0.35:editOpacity;
      ctx.drawImage(editStrokeCanvas.current,0,0);
      ctx.globalAlpha=1;ctx.globalCompositeOperation="source-over";
    }
    // Clear stroke canvas
    editStrokeCanvas.current.getContext("2d").clearRect(0,0,editStrokeCanvas.current.width,editStrokeCanvas.current.height);
    compositeEdit();
  }
  editDrawing.current=false;editLastPos.current=null;
};

const editClear=()=>{
  const acv=getActiveCanvas();if(acv)acv.getContext("2d").clearRect(0,0,acv.width,acv.height);
  if(editStrokeCanvas.current)editStrokeCanvas.current.getContext("2d").clearRect(0,0,editStrokeCanvas.current.width,editStrokeCanvas.current.height);
  editHistoryRef.current=[];sEditSel(null);editSelPath.current=null;compositeEdit();
};
const editUndo=()=>{
  const h=editHistoryRef.current;if(h.length===0)return;
  const snap=h.pop();
  const lcv=editLayerCanvases.current[snap.layerId];
  if(lcv)lcv.getContext("2d").putImageData(snap.data,0,0);
  compositeEdit();
};

// Pinch zoom + pan + two-finger tap undo
const editTouchStart=(e)=>{
  if(e.touches.length===2){
    e.preventDefault();
    const t=e.touches;
    const dist=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
    const cx=(t[0].clientX+t[1].clientX)/2;
    const cy=(t[0].clientY+t[1].clientY)/2;
    // Get container center for focal-point zoom
    const wrap=editWrapRef.current;
    const parent=wrap?.parentElement;
    const pr=parent?.getBoundingClientRect();
    const ccx=pr?(pr.left+pr.width/2):cx;
    const ccy=pr?(pr.top+pr.height/2):cy;
    // Focal offset = pinch center relative to (container center + pan)
    const focalX=cx-ccx-editPan.x;
    const focalY=cy-ccy-editPan.y;
    editPinch.current={dist,cx,cy,zoom:editZoom,pan:{...editPan},focalX,focalY,moved:false,time:Date.now()};
    return;
  }
  // Pencil-only mode: ignore finger touches
  if(pencilOnly&&e.touches[0]&&e.touches[0].touchType!=="stylus"){return}
  editStartDraw(e);
};
const editTouchMove=(e)=>{
  if(e.touches.length===2&&editPinch.current){
    e.preventDefault();
    const t=e.touches;
    const dist=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
    const scale=dist/editPinch.current.dist;
    const cx=(t[0].clientX+t[1].clientX)/2;
    const cy=(t[0].clientY+t[1].clientY)/2;
    // Mark as moved if pinch/pan exceeds threshold
    if(Math.abs(scale-1)>0.05||Math.abs(cx-editPinch.current.cx)>10||Math.abs(cy-editPinch.current.cy)>10){
      editPinch.current.moved=true;
    }
    const newZoom=Math.max(0.25,Math.min(5,editPinch.current.zoom*scale));
    // Focal-point zoom: pan so pinch center stays over same canvas point
    const{pan:P0,cx:cx0,cy:cy0,focalX,focalY}=editPinch.current;
    const newPan={
      x:P0.x+(cx-cx0)+focalX*(1-scale),
      y:P0.y+(cy-cy0)+focalY*(1-scale)
    };
    sEditZoom(newZoom);
    sEditPan(newPan);
    return;
  }
  if(pencilOnly&&e.touches[0]&&e.touches[0].touchType!=="stylus"){return}
  editDoDraw(e);
};
const editTouchEnd=(e)=>{
  if(editPinch.current&&e.touches.length<2){
    // Two-finger tap (no move, quick) → undo
    if(!editPinch.current.moved&&Date.now()-editPinch.current.time<400){
      const h=editHistoryRef.current;if(h.length>0){
        const snap=h.pop();
        const lcv=editLayerCanvases.current[snap.layerId];
        if(lcv)lcv.getContext("2d").putImageData(snap.data,0,0);
        compositeEdit();
      }
    }
    editPinch.current=null;
  }
  editStopDraw();
};

const editWheel=(e)=>{

  const newZoom=Math.max(0.25,Math.min(5,editZoom*factor));

  const focalX=e.clientX-ccx-editPan.x;

  sEditPan(p=>({x:p.x+focalX*(1-scale),y:p.y+focalY*(1-scale)}));

};

// Selective bg-removal: paint mask → send full image → composite only in mask area
const[bgRemoving,sBgRemoving]=useState(false);
const[bgProgress,sBgProgress]=useState("");
const[bgReverse,sBgReverse]=useState(false); // reverse mask: painted=keep, unpainted=remove

const editBgRemove=async(mode)=>{
  // mode: "nai" | "local"
  if(mode==="nai"&&!se.apiToken){tw("⚠ API 토큰 필요");return}
  const acv=getActiveCanvas();if(!acv){tw("⚠ 레이어를 선택하세요");return}
  const img=editImgRef.current;if(!img)return;
  // Check mask
  const aCtx=acv.getContext("2d",{willReadFrequently:true});
  const aData=aCtx.getImageData(0,0,acv.width,acv.height);
  let hasMask=false;for(let i=3;i<aData.data.length;i+=4){if(aData.data[i]>20){hasMask=true;break}}
  // Build composite image (without active layer's mask)
  const full=document.createElement("canvas");full.width=se.width;full.height=se.height;
  const fCtx=full.getContext("2d");
  editLayers.forEach(l=>{
    if(!l.visible||l.id===editActiveLayer)return;
    const lcv=editLayerCanvases.current[l.id];if(lcv)fCtx.drawImage(lcv,0,0);
  });

  sBgRemoving(true);sBgProgress("준비 중...");
  try{
    let bgImg;
    if(mode==="local"){
      // Local ONNX removal
      const blob=await new Promise(r=>full.toBlob(r,"image/png"));
      const resultBlob=await localBgRemove(blob,msg=>sBgProgress(msg));
      const bUrl=URL.createObjectURL(resultBlob);
      bgImg=new Image();
      await new Promise((res,rej)=>{bgImg.onload=res;bgImg.onerror=rej;bgImg.src=bUrl});
      URL.revokeObjectURL(bUrl);
    }else{
      // NAI API removal
      sBgProgress("NAI API 호출 중...");
      const b64=full.toDataURL("image/png").replace(/^data:[^;]+;base64,/,"");
      const resultUrl=await augmentImage(se.apiToken,"bg-removal",se.width,se.height,b64);
      const resp=await fetch(resultUrl);const blob=await resp.blob();
      bgImg=new Image();const bUrl=URL.createObjectURL(blob);
      await new Promise(r=>{bgImg.onload=r;bgImg.src=bUrl});
      URL.revokeObjectURL(bUrl);
    }

    // Apply result — replace source image with bg-removed version
    console.log("[BG-Removal] result image:",bgImg.width,"x",bgImg.height);

    if(hasMask){
      // Masked mode: blend original and bg-removed based on mask
      editSaveSnap();
      const out=document.createElement("canvas");out.width=se.width;out.height=se.height;
      const oCtx=out.getContext("2d");
      // Start with original
      oCtx.drawImage(img,0,0,se.width,se.height);
      const origData=oCtx.getImageData(0,0,se.width,se.height);
      // Draw bg-removed
      oCtx.clearRect(0,0,se.width,se.height);
      oCtx.drawImage(bgImg,0,0,se.width,se.height);
      const bgData=oCtx.getImageData(0,0,se.width,se.height);
      // Blend based on mask + reverse setting
      // Normal: painted=remove bg, unpainted=keep original
      // Reverse: painted=keep original, unpainted=remove bg
      for(let i=0;i<aData.data.length;i+=4){
        const inMask=aData.data[i+3]>20;
        const useBgRemoved=bgReverse?!inMask:inMask;
        if(useBgRemoved){
          origData.data[i]=bgData.data[i];
          origData.data[i+1]=bgData.data[i+1];
          origData.data[i+2]=bgData.data[i+2];
          origData.data[i+3]=bgData.data[i+3];
        }
      }
      oCtx.putImageData(origData,0,0);
      const newUrl=out.toDataURL("image/png");
      sEditSrc(newUrl);
      aCtx.clearRect(0,0,acv.width,acv.height);
      compositeEdit();
      tw(bgReverse?"보존 영역 외 배경 제거 완료!":"선택 영역 배경 제거 완료!");
    }else{
      // Full mode: replace entire source image
      editSaveSnap();
      const out=document.createElement("canvas");out.width=se.width;out.height=se.height;
      out.getContext("2d").drawImage(bgImg,0,0,se.width,se.height);
      const newUrl=out.toDataURL("image/png");
      sEditSrc(newUrl);
      compositeEdit();
      tw("전체 이미지 배경 제거 완료!");
    }
    compositeEdit();
  }catch(e){tw("⚠ 배경 제거 실패: "+e.message);console.error(e)}
  finally{sBgRemoving(false);sBgProgress("")}
};

    ind.className="drag-indicator";
    ind.style.cssText="position:fixed;left:"+r.left+"px;width:"+r.width+"px;height:3px;background:#785aff;border-radius:2px;z-index:9999;pointer-events:none;";
