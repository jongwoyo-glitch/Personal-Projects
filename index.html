const NAI_IMG="https://image.novelai.net/ai/generate-image";
const NAI_SUB="https://api.novelai.net/user/subscription";

async function fetchAnlas(token){
  token=(token||"").trim();
  if(!token)return null;
  try{
    const r=await fetch(NAI_SUB,{headers:{"Authorization":"Bearer "+token}});
    if(!r.ok){console.warn("NAI sub API error:",r.status);return{anlas:"err("+r.status+")",tier:0,active:false}}
    const d=await r.json();
    console.log("NAI /user/subscription response:",JSON.stringify(d).slice(0,2000));
    let a=null;
    if(d.trainingStepsLeft?.fixedTrainingStepsLeft!=null)a=d.trainingStepsLeft.fixedTrainingStepsLeft;
    else if(d.subscription?.trainingStepsLeft?.fixedTrainingStepsLeft!=null)a=d.subscription.trainingStepsLeft.fixedTrainingStepsLeft;
    else if(d.fixedTrainingStepsLeft!=null)a=d.fixedTrainingStepsLeft;
    if(a===null){const m=JSON.stringify(d).match(/"fixedTrainingStepsLeft"\s*:\s*(\d+)/);if(m)a=parseInt(m[1])}
    const tier=d.tier??d.subscription?.tier??0;
    const active=d.active??d.subscription?.active??false;
    return{anlas:a??0,tier,active,raw:d};
  }catch(e){
    console.warn("fetchAnlas:",e.message||e);
    const msg=e.message||"";
    if(msg.includes("Failed to fetch")||msg.includes("NetworkError"))
      return{anlas:"offline",tier:0,active:false};
    return{anlas:"err",tier:0,active:false,raw:{error:msg}}
  }
}

async function generateImage(token,se,basePos,baseNeg,charPrompts,vibeRefs,i2iOpts){
  token=token.trim();
  const seed=se.seed?parseInt(se.seed):Math.floor(Math.random()*4294967295);
  const isV4=se.model.includes("-4");
  const isV45=se.model.includes("-4-5");
  const negFB="blurry, lowres, error, film grain, worst quality, bad quality, jpeg artifacts, very displeasing, chromatic aberration";
  const negText=baseNeg||negFB;
  charPrompts=charPrompts||[];

  let params;
  if(isV4){
    // V4.5: pipe syntax for multi-char (confirmed working)
    // V4: structured char_captions
    let effectiveBasePos=basePos;
    let charCaptions=[];
    let charNegCaptions=[];
    let charPromptsLegacy=[];
    let negAll=negText;

    if(charPrompts.length>0){
      if(isV45){
        effectiveBasePos=[basePos,...charPrompts.map(c=>c.pos)].filter(Boolean).join(" | ");
        negAll=[negText,...charPrompts.map(c=>c.neg).filter(Boolean)].join(", ");
      }else{
        charCaptions=charPrompts.map(cp=>({char_caption:cp.pos||"",centers:[]}));
        charNegCaptions=charPrompts.map(cp=>({char_caption:cp.neg||"",centers:[]}));
        charPromptsLegacy=charPrompts.map(cp=>({prompt:cp.pos||"",uc:cp.neg||""}));
      }
    }

    params={
      params_version:3,
      width:se.width,height:se.height,scale:se.scale,sampler:se.sampler,steps:se.steps,
      seed:seed,n_samples:1,ucPreset:0,qualityToggle:true,
      sm:se.smea||false,sm_dyn:se.smeaDyn||false,
      dynamic_thresholding:false,controlnet_strength:1,legacy:false,
      add_original_image:true,cfg_rescale:0,noise_schedule:"karras",
      legacy_v3_extend:false,skip_cfg_above_sigma:null,
      use_coords:false,
      characterPrompts:charPromptsLegacy,
      v4_prompt:{
        caption:{base_caption:effectiveBasePos,char_captions:charCaptions},
        use_coords:false,use_order:true
      },
      v4_negative_prompt:{
        caption:{base_caption:negAll,char_captions:charNegCaptions}
      },
      negative_prompt:negAll,
    };
    params._inputOverride=effectiveBasePos;
  }else{
    // V3 — combine all into flat prompt
    const allPos=[basePos,...charPrompts.map(c=>c.pos)].filter(Boolean).join(", ");
    const allNeg=[negText,...charPrompts.map(c=>c.neg)].filter(Boolean).join(", ");
    params={
      width:se.width,height:se.height,scale:se.scale,sampler:se.sampler,steps:se.steps,
      seed:seed,n_samples:1,ucPreset:0,qualityToggle:true,
      sm:se.smea||false,sm_dyn:se.smeaDyn||false,
      dynamic_thresholding:false,controlnet_strength:1,legacy:false,
      add_original_image:true,cfg_rescale:0,noise_schedule:"native",
      uc:allNeg,
    };
    params._inputOverride=allPos;
  }

  // Vibe transfer
  if(vibeRefs&&vibeRefs.length>0){
    params.reference_image_multiple=[];
    params.reference_strength_multiple=[];
    params.reference_information_extracted_multiple=[];
    for(const ref of vibeRefs){
      const b64=ref.d.replace(/^data:image\/[^;]+;base64,/,"");
      params.reference_image_multiple.push(b64);
      params.reference_strength_multiple.push(ref.s);
      params.reference_information_extracted_multiple.push(ref.ie);
    }
  }

  // img2img support
  if(i2iOpts){
    params.image=i2iOpts.image;
    params.strength=i2iOpts.strength||0.6;
    params.noise=i2iOpts.noise||0;
    params.extra_noise_seed=seed;
    params.inpaintImg2ImgStrength=1;
    params.autoSmea=false;
    params.deliberate_euler_ancestral_bug=false;
    params.prefer_brownian=true;
    params.color_correct=false;
    params.legacy_uc=false;
    params.normalize_reference_strength_multiple=true;
    if(params.v4_negative_prompt)params.v4_negative_prompt.legacy_uc=false;
  }

  const inputField=params._inputOverride||basePos;
  delete params._inputOverride;
  const action=i2iOpts?"img2img":"generate";
  const payload={input:inputField,model:se.model,action:action,parameters:params};

  console.log("=== NAI",action.toUpperCase(),"===");
  console.log("Model:",se.model,"V4.5:",isV45,"Chars:",charPrompts.length);
  if(i2iOpts)console.log("Strength:",i2iOpts.strength,"Noise:",i2iOpts.noise,"ImgB64 len:",i2iOpts.image.length,"starts:",i2iOpts.image.slice(0,20));
  console.log("[POSITIVE input]:",inputField.slice(0,300));
  console.log("[POSITIVE v4_prompt.base_caption]:",params.v4_prompt?.caption?.base_caption?.slice(0,300)||"(V3)");
  if(params.v4_prompt?.caption?.char_captions?.length>0)params.v4_prompt.caption.char_captions.forEach((cc,i)=>console.log("[POSITIVE char_caption "+i+"]:",cc.char_caption?.slice(0,150)));
  console.log("[NEGATIVE negative_prompt]:",params.negative_prompt?.slice(0,300)||"(none)");
  console.log("[NEGATIVE v4_neg.base_caption]:",params.v4_negative_prompt?.caption?.base_caption?.slice(0,300)||"(none)");
  if(params.v4_negative_prompt?.caption?.char_captions?.length>0)params.v4_negative_prompt.caption.char_captions.forEach((cc,i)=>console.log("[NEGATIVE char_neg_caption "+i+"]:",cc.char_caption?.slice(0,150)));
  console.log("[characterPrompts]:",JSON.stringify(params.characterPrompts?.map(c=>({p:c.prompt?.slice(0,50),uc:c.uc?.slice(0,50)}))));

  const url="https://image.novelai.net/ai/generate-image";
  const resp=await fetch(url,{method:"POST",body:JSON.stringify(payload),headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"}});
  if(!resp.ok){const e=await resp.text();console.error("NAI err:",resp.status,e);throw new Error("NAI "+resp.status+": "+e.slice(0,200))}
  const blob=await resp.blob();
  try{const zip=await JSZip.loadAsync(blob);const f=Object.keys(zip.files);if(!f.length)throw 0;return URL.createObjectURL(await zip.files[f[0]].async("blob"))}
  catch(e){if(blob.type?.startsWith("image/"))return URL.createObjectURL(blob);throw new Error("응답 파싱 실패")}
}

// Local bg-removal via @imgly/background-removal (ONNX/WASM, free, no API)
async function localBgRemove(imgBlob,onProgress){
  if(!window._imglyRemoveBackground){
    onProgress&&onProgress("라이브러리 로딩 중...");
    // Try dynamic import as fallback
    try{
      const m=await import("https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.7.0/+esm");
      window._imglyRemoveBackground=m.default||m.removeBackground||m;
      console.log("[BG-Removal] loaded via dynamic import");
    }catch(e){
      console.error("[BG-Removal] dynamic import also failed:",e);
      throw new Error("배경 제거 라이브러리 로드 실패.\ncoi-serviceworker.js가 같은 폴더에 있는지 확인하세요.\n페이지를 새로고침 후 다시 시도해보세요.");
    }
  }
  onProgress&&onProgress("배경 분석 중... (최초 실행 시 ~40MB 모델 다운로드)");
  const result=await window._imglyRemoveBackground(imgBlob,{
    model:"isnet_fp16",
    output:{format:"image/png",type:"foreground"},
    progress:(key,current,total)=>{
      if(total>0){
        const pct=Math.round(current/total*100);
        onProgress&&onProgress(key.includes("onnx")?"모델 다운로드 "+pct+"%":"처리 중 "+pct+"%");
      }
    }
  });
  return result;
}

function estimateAnlas(se,isOpus,vibeCount,action){
  action=action||"generate";
  const px=se.width*se.height;
  const steps=se.steps||28;
  const nSamples=1;
  const normalMaxPx=1024*1024;
  const isNormal=px<=normalMaxPx;
  const isSmall=px<=640*640;

  // Opus free conditions: txt2img only, 1 sample, ≤normal size, ≤28 steps
  if(isOpus&&action==="generate"&&nSamples===1&&isNormal&&steps<=28)return{cost:0,free:true,label:"FREE (Opus)"};

  // Base cost: per-megapixel scaling
  // NAI charges roughly based on pixel count relative to 1MP
  const mpRatio=px/normalMaxPx;
  let baseCost;
  if(isSmall)baseCost=2;
  else if(isNormal)baseCost=Math.max(2,Math.ceil(mpRatio*5));
  else baseCost=Math.ceil(mpRatio*5); // large images scale up

  // Steps multiplier (28 is base)
  let stepMult=steps/28;
  if(stepMult<1)stepMult=1; // minimum 1x even for fewer steps
  let cost=Math.ceil(baseCost*stepMult);

  // SMEA surcharge (~30%)
  if(se.smea&&!se.smeaDyn)cost=Math.ceil(cost*1.3);
  if(se.smeaDyn)cost=Math.ceil(cost*1.5);

  // img2img / inpaint uses base image = not free for Opus
  if(action!=="generate")cost=Math.max(cost,5);

  // n_samples
  cost*=nSamples;

  // Vibe Transfer costs (V4 models)
  let vibeCost=0;
  if(vibeCount>0&&se.model&&se.model.includes("4")){
    vibeCost=vibeCount*2; // encoding fee per vibe
  }
  if(vibeCount>4)vibeCost+=(vibeCount-4)*2; // extra vibes surcharge

  const total=cost+vibeCost;
  const parts=[];
  parts.push(`생성 ${cost}`);
  if(vibeCost>0)parts.push(`바이브 ${vibeCost}`);

  return{cost:total,free:false,label:`~${total} Anlas (${parts.join(" + ")})`};
}

    const r=parseInt(color.slice(1,3),16)/255,g=parseInt(color.slice(3,5),16)/255,b=parseInt(color.slice(5,7),16)/255;
    const mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;
    let h=0;if(d>0){if(mx===r)h=((g-b)/d+6)%6;else if(mx===g)h=(b-r)/d+2;else h=(r-g)/d+4;h/=6}
    return{h,s:mx>0?d/mx:0,v:mx};
  });
  const hsv2hex=(h,s,v)=>{
    const i=Math.floor(h*6),f=h*6-i,p=v*(1-s),q=v*(1-f*s),t=v*(1-(1-f)*s);
    let r,g,b;switch(i%6){case 0:r=v;g=t;b=p;break;case 1:r=q;g=v;b=p;break;case 2:r=p;g=v;b=t;break;case 3:r=p;g=q;b=v;break;case 4:r=t;g=p;b=v;break;default:r=v;g=p;b=q}
    return"#"+[r,g,b].map(x=>Math.round(x*255).toString(16).padStart(2,"0")).join("");
  };
  const drawWheel=useCallback(()=>{
    const cv=wheelRef.current;if(!cv)return;
    const sz=cv.width,cx=sz/2,cy=sz/2,outerR=sz/2-2,innerR=sz/2-24;
    const ctx=cv.getContext("2d");ctx.clearRect(0,0,sz,sz);
    // Draw hue ring
    for(let a=0;a<360;a++){
      const rad=a*Math.PI/180;const rad2=(a+2)*Math.PI/180;
      ctx.beginPath();ctx.moveTo(cx+innerR*Math.cos(rad),cy+innerR*Math.sin(rad));
      ctx.lineTo(cx+outerR*Math.cos(rad),cy+outerR*Math.sin(rad));
      ctx.lineTo(cx+outerR*Math.cos(rad2),cy+outerR*Math.sin(rad2));
      ctx.lineTo(cx+innerR*Math.cos(rad2),cy+innerR*Math.sin(rad2));
      ctx.closePath();ctx.fillStyle=`hsl(${a},100%,50%)`;ctx.fill();
    }
    // Hue indicator
    const ha=hsv.h*Math.PI*2;const hx=cx+(innerR+12)*Math.cos(ha),hy=cy+(innerR+12)*Math.sin(ha);
    ctx.beginPath();ctx.arc(hx,hy,5,0,Math.PI*2);ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.stroke();
  },[hsv.h]);
  const drawSV=useCallback(()=>{
    const cv=svRef.current;if(!cv)return;
    const sz=cv.width;const ctx=cv.getContext("2d");
    // SV square
    for(let x=0;x<sz;x++){for(let y=0;y<sz;y++){
      const s=x/sz,v=1-y/sz;
      ctx.fillStyle=hsv2hex(hsv.h,s,v);ctx.fillRect(x,y,1,1);
    }}
    // SV indicator
    const ix=hsv.s*sz,iy=(1-hsv.v)*sz;
    ctx.beginPath();ctx.arc(ix,iy,6,0,Math.PI*2);ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.stroke();
    ctx.beginPath();ctx.arc(ix,iy,5,0,Math.PI*2);ctx.strokeStyle="#000";ctx.lineWidth=1;ctx.stroke();
  },[hsv]);
  useEffect(()=>{drawWheel()},[drawWheel]);
  useEffect(()=>{drawSV()},[drawSV]);

  const onWheelClick=(e)=>{
    const cv=wheelRef.current;if(!cv)return;
    const r=cv.getBoundingClientRect();
    const x=e.clientX-r.left-cv.width/2,y=e.clientY-r.top-cv.height/2;
    const dist=Math.sqrt(x*x+y*y),sz=cv.width/2;
    if(dist<sz-26){/* inside SV area, ignore */return}
    if(dist>sz)return;
    let h=Math.atan2(y,x)/(Math.PI*2);if(h<0)h+=1;
    const nw={...hsv,h};sHsv(nw);onChange(hsv2hex(nw.h,nw.s,nw.v));
  };
  const onSVClick=(e)=>{
    const cv=svRef.current;if(!cv)return;
    const r=cv.getBoundingClientRect();
    const s=Math.max(0,Math.min(1,(e.clientX-r.left)/cv.width));
    const v=Math.max(0,Math.min(1,1-(e.clientY-r.top)/cv.height));
    const nw={...hsv,s,v};sHsv(nw);onChange(hsv2hex(nw.h,nw.s,nw.v));
  };
  const wheelDrag=useRef(false),svDrag=useRef(false);
  const hexVal=hsv2hex(hsv.h,hsv.s,hsv.v);
  return(
  <div style={{position:"fixed",zIndex:10001,top:"50%",left:"50%",transform:"translate(-50%,-50%)",background:"#1a1428",borderRadius:12,padding:16,boxShadow:"0 8px 40px rgba(0,0,0,.6)",border:"1px solid rgba(90,180,255,.2)",display:"flex",flexDirection:"column",alignItems:"center",gap:10}} onClick={e=>e.stopPropagation()}>
    <div style={{position:"relative",width:200,height:200}}>
      <canvas ref={wheelRef} width={200} height={200} style={{position:"absolute",inset:0,cursor:"crosshair"}}
        onMouseDown={e=>{wheelDrag.current=true;onWheelClick(e)}}

      <canvas ref={svRef} width={100} height={100} style={{position:"absolute",top:50,left:50,width:100,height:100,cursor:"crosshair",borderRadius:2}}

        const rr=parseInt(v.slice(1,3),16)/255,gg=parseInt(v.slice(3,5),16)/255,bb=parseInt(v.slice(5,7),16)/255;
        const mx=Math.max(rr,gg,bb),mn=Math.min(rr,gg,bb),d=mx-mn;
        let h=0;if(d>0){if(mx===rr)h=((gg-bb)/d+6)%6;else if(mx===gg)h=(bb-rr)/d+2;else h=(rr-gg)/d+4;h/=6}

const downloadImg=async()=>{

  const resp=await fetch(genImg);
  const blob=await resp.blob();
  const fmt=se.format||"png";
  let finalBlob=blob;
  if(fmt==="webp"&&blob.type!=="image/webp"){
    // Convert to webp via canvas
    const img=new Image();const url=URL.createObjectURL(blob);
    await new Promise(r=>{img.onload=r;img.src=url});
    const cv=document.createElement("canvas");cv.width=img.width;cv.height=img.height;

const brushResizing=useRef(null);

// Eyedropper helper
const doEyedrop=(e)=>{

  const tctx=tmp.getContext("2d");

  const hex="#"+[px[0],px[1],px[2]].map(v=>v.toString(16).padStart(2,"0")).join("");
  sEditColor(hex);tw("색상 추출: "+hex);
};

const editStartDraw=(e)=>{
  // Right-click = eyedropper (desktop)
  if(e.button===2){e.preventDefault();doEyedrop(e);return}
  // Command/Ctrl + click = eyedropper (iPad keyboard / desktop)
  if((e.metaKey||e.ctrlKey)&&!e.altKey){
    e.preventDefault();doEyedrop(e);return;
  }
  // Ctrl+Alt drag = brush resize
  if((e.ctrlKey||e.metaKey)&&e.altKey&&!e.touches){
    e.preventDefault();
    const r=editWrapRef.current?.getBoundingClientRect();
    brushResizing.current={startX:e.clientX,startSize:editBrush};
    sBrushPreview({x:e.clientX-(r?.left||0),y:e.clientY-(r?.top||0),size:editBrush});
    const onMove=(ev)=>{
      const dx=ev.clientX-brushResizing.current.startX;
      const ns=Math.max(1,Math.min(100,brushResizing.current.startSize+Math.round(dx/2)));
      sEditBrush(ns);sBrushPreview(p=>p?{...p,size:ns}:null);
    };
    const onUp=()=>{brushResizing.current=null;sBrushPreview(null);document.removeEventListener("mousemove",onMove);document.removeEventListener("mouseup",onUp)};
    document.addEventListener("mousemove",onMove);document.addEventListener("mouseup",onUp);
    return;
  }
  if(e.touches&&e.touches.length===2){e.preventDefault();editUndo();return}
  if(e.touches&&e.touches.length>1)return;
  e.preventDefault();
  if(editTool==="eyedropper"){
    doEyedrop(e);sEditTool("brush");
    return;
  }
  editSaveSnap();editDrawing.current=true;editDoDraw(e);
};

const editDoDraw=(e)=>{
  e.preventDefault();if(!editDrawing.current)return;
  const acv=getActiveCanvas();if(!acv)return;
  const{x,y}=getEditXY(e);

  if(editTool==="blur"){
    const ctx=acv.getContext("2d");
    const r=Math.max(2,Math.floor(editBrush/2));
    const sr=Math.max(1,Math.floor(editBlurStr));
    const tmp=document.createElement("canvas");tmp.width=se.width;tmp.height=se.height;
    const tctx=tmp.getContext("2d");
    const img=editImgRef.current;if(img)tctx.drawImage(img,0,0,se.width,se.height);
    editLayers.forEach(l=>{if(l.visible){const lcv=editLayerCanvases.current[l.id];if(lcv)tctx.drawImage(lcv,0,0)}});
    const ix=Math.max(0,Math.round(x)-r),iy=Math.max(0,Math.round(y)-r);
    const iw=Math.min(r*2,se.width-ix),ih=Math.min(r*2,se.height-iy);
    if(iw<=0||ih<=0)return;
    const sm=document.createElement("canvas");sm.width=Math.max(1,Math.round(iw/sr));sm.height=Math.max(1,Math.round(ih/sr));
    sm.getContext("2d").drawImage(tmp,ix,iy,iw,ih,0,0,sm.width,sm.height);
    ctx.globalCompositeOperation="source-over";ctx.globalAlpha=0.7;
    ctx.drawImage(sm,0,0,sm.width,sm.height,ix,iy,iw,ih);
    ctx.globalAlpha=1;
  }else{
    // All other tools: draw to stroke canvas for uniform opacity
    if(!editStrokeCanvas.current){
      editStrokeCanvas.current=document.createElement("canvas");
      editStrokeCanvas.current.width=se.width;editStrokeCanvas.current.height=se.height;
    }
    const sctx=editStrokeCanvas.current.getContext("2d");
    if(editTool==="eraser"){
      // Eraser draws directly to layer
      const ctx=acv.getContext("2d");
      ctx.globalCompositeOperation="destination-out";ctx.globalAlpha=1;
      ctx.lineWidth=editBrush;ctx.lineCap="round";ctx.lineJoin="round";
      if(editLastPos.current){ctx.beginPath();ctx.moveTo(editLastPos.current.x,editLastPos.current.y);ctx.lineTo(x,y);ctx.stroke()}
      else{ctx.beginPath();ctx.arc(x,y,editBrush/2,0,Math.PI*2);ctx.fill()}
    }else if(editTool==="bgremove"){
      sctx.globalCompositeOperation="source-over";sctx.globalAlpha=1;
      sctx.strokeStyle="#00ff88";sctx.fillStyle="#00ff88";
      sctx.lineWidth=editBrush;sctx.lineCap="round";sctx.lineJoin="round";
      if(editLastPos.current){sctx.beginPath();sctx.moveTo(editLastPos.current.x,editLastPos.current.y);sctx.lineTo(x,y);sctx.stroke()}
      else{sctx.beginPath();sctx.arc(x,y,editBrush/2,0,Math.PI*2);sctx.fill()}
    }else{
      // Brush: draw at full opacity to stroke canvas
      sctx.globalCompositeOperation="source-over";sctx.globalAlpha=1;
      sctx.strokeStyle=editColor;sctx.fillStyle=editColor;
      sctx.lineWidth=editBrush;sctx.lineCap="round";sctx.lineJoin="round";
      if(editLastPos.current){sctx.beginPath();sctx.moveTo(editLastPos.current.x,editLastPos.current.y);sctx.lineTo(x,y);sctx.stroke()}
      else{sctx.beginPath();sctx.arc(x,y,editBrush/2,0,Math.PI*2);sctx.fill()}
    }
  }
  editLastPos.current={x,y};
  compositeEdit();
};

const editStopDraw=()=>{
  // On stroke end: composite stroke canvas onto active layer with opacity
  if(editDrawing.current&&editStrokeCanvas.current&&editTool!=="eraser"&&editTool!=="blur"){
    const acv=getActiveCanvas();
    if(acv){
      const ctx=acv.getContext("2d");
      ctx.globalCompositeOperation="source-over";
      ctx.globalAlpha=(editTool==="bgremove")?0.35:editOpacity;
      ctx.drawImage(editStrokeCanvas.current,0,0);
      ctx.globalAlpha=1;
    }
    // Clear stroke canvas
    editStrokeCanvas.current.getContext("2d").clearRect(0,0,editStrokeCanvas.current.width,editStrokeCanvas.current.height);
    compositeEdit();
  }
  editDrawing.current=false;editLastPos.current=null;
};

const editClear=()=>{

const editUndo=()=>{

// Pinch zoom + pan
const editTouchStart=(e)=>{
  if(e.touches.length===2){
    e.preventDefault();
    const t=e.touches;
    const dist=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
    const cx=(t[0].clientX+t[1].clientX)/2;
    const cy=(t[0].clientY+t[1].clientY)/2;
    editPinch.current={dist,cx,cy,zoom:editZoom,pan:{...editPan}};
    return;
  }
  editStartDraw(e);
};
const editTouchMove=(e)=>{
  if(e.touches.length===2&&editPinch.current){
    e.preventDefault();
    const t=e.touches;
    const dist=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
    const scale=dist/editPinch.current.dist;
    const newZoom=Math.max(0.25,Math.min(5,editPinch.current.zoom*scale));
    const cx=(t[0].clientX+t[1].clientX)/2;
    const cy=(t[0].clientY+t[1].clientY)/2;
    sEditZoom(newZoom);
    sEditPan({x:editPinch.current.pan.x+(cx-editPinch.current.cx),y:editPinch.current.pan.y+(cy-editPinch.current.cy)});
    return;
  }
  editDoDraw(e);
};
const editTouchEnd=(e)=>{
  if(editPinch.current&&e.touches.length<2)editPinch.current=null;
  editStopDraw();
};

// Selective bg-removal: paint mask → send full image → composite only in mask area
const[bgRemoving,sBgRemoving]=useState(false);
const[bgProgress,sBgProgress]=useState("");

const editBgRemove=async(mode)=>{
  // mode: "nai" | "local"
  if(mode==="nai"&&!se.apiToken){tw("⚠ API 토큰 필요");return}
  const acv=getActiveCanvas();if(!acv){tw("⚠ 레이어를 선택하세요");return}
  const img=editImgRef.current;if(!img)return;
  // Check mask
  const aCtx=acv.getContext("2d",{willReadFrequently:true});
  const aData=aCtx.getImageData(0,0,acv.width,acv.height);
  let hasMask=false;for(let i=3;i<aData.data.length;i+=4){if(aData.data[i]>20){hasMask=true;break}}
  // Build composite image (without active layer's mask)
  const full=document.createElement("canvas");full.width=se.width;full.height=se.height;
  const fCtx=full.getContext("2d");
  fCtx.drawImage(img,0,0,se.width,se.height);
  editLayers.forEach(l=>{if(l.visible&&l.id!==editActiveLayer){const lcv=editLayerCanvases.current[l.id];if(lcv)fCtx.drawImage(lcv,0,0)}});

  sBgRemoving(true);sBgProgress("준비 중...");
  try{
    let bgImg;
    if(mode==="local"){
      // Local ONNX removal
      const blob=await new Promise(r=>full.toBlob(r,"image/png"));
      const resultBlob=await localBgRemove(blob,msg=>sBgProgress(msg));
      const bUrl=URL.createObjectURL(resultBlob);
      bgImg=new Image();
      await new Promise((res,rej)=>{bgImg.onload=res;bgImg.onerror=rej;bgImg.src=bUrl});
      URL.revokeObjectURL(bUrl);
    }else{
      // NAI API removal
      sBgProgress("NAI API 호출 중...");
      const b64=full.toDataURL("image/png").replace(/^data:[^;]+;base64,/,"");
      const resultUrl=await augmentImage(se.apiToken,"bg-removal",se.width,se.height,b64);
      const resp=await fetch(resultUrl);const blob=await resp.blob();
      bgImg=new Image();const bUrl=URL.createObjectURL(blob);
      await new Promise(r=>{bgImg.onload=r;bgImg.src=bUrl});
      URL.revokeObjectURL(bUrl);
    }

    // Apply result
    editSaveSnap();
    aCtx.clearRect(0,0,acv.width,acv.height);
    aCtx.drawImage(bgImg,0,0,se.width,se.height);

    if(hasMask){
      // Clip to mask area only
      const resultData=aCtx.getImageData(0,0,acv.width,acv.height);
      for(let i=0;i<aData.data.length;i+=4){
        if(aData.data[i+3]<20) resultData.data[i+3]=0;
      }
      aCtx.putImageData(resultData,0,0);
      tw("선택 영역 배경 제거 완료!");
    }else{
      tw("전체 이미지 배경 제거 완료!");
    }
    compositeEdit();
  }catch(e){tw("⚠ 배경 제거 실패: "+e.message);console.error(e)}
  finally{sBgRemoving(false);sBgProgress("")}
};

{/* SETTINGS MODAL */}
<Mod open={so} onClose={()=>sSo(false)} title="⚙ 설정" w="min(560px,92vw)">
<div style={{display:"flex",flexDirection:"column",gap:12}}>
<div><label style={Z.lb}>NAI API Token</label>
<div style={{display:"flex",gap:5}}>
<input type={st?"text":"password"} value={se.apiToken} onChange={e=>up(p=>({...p,settings:{...p.settings,apiToken:e.target.value.trim()}}))} placeholder="pst-..." style={{...Z.ip,flex:1,fontFamily:"'JetBrains Mono',monospace",fontSize:13}}/>
<button onClick={()=>sSt(p=>!p)} style={{...Z.tB,width:44,height:44,fontSize:16,borderRadius:8}}>{st?"🙈":"👁"}</button></div>
<div style={{fontSize:10,color:"#666",marginTop:3}}>
  User Settings → Account → Get Persistent API Token (pst-로 시작)
  {se.apiToken&&!se.apiToken.startsWith("pst-")&&<span style={{color:"#f88"}}> · ⚠ 토큰이 pst-로 시작하지 않습니다</span>}
  {se.apiToken&&se.apiToken.length<20&&<span style={{color:"#f88"}}> · ⚠ 토큰이 너무 짧습니다</span>}
</div>
{se.apiToken&&<div style={{display:"flex",gap:6,marginTop:4,alignItems:"center"}}>
<div style={{fontSize:10,color:"#5a5"}}>✓ 저장됨 ({se.apiToken.slice(0,8)}...)</div>
<button onClick={async()=>{
  try{
    const r=await fetch("https://api.novelai.net/user/subscription",{headers:{"Authorization":"Bearer "+se.apiToken.trim()}});
    if(r.ok){const d=await r.json();sAnlas(d);tw("✓ 토큰 유효! ("+r.status+")")}
    else tw("⚠ "+r.status+" "+r.statusText)
  }catch(e){tw("⚠ 연결 실패 (CORS?)")}
}} style={{...Z.hB,fontSize:10,padding:"3px 10px"}}>🔑 토큰 테스트</button>
</div>}</div>
{/* Account info - manual */}
<div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-end"}}>
<div style={{flex:1,minWidth:120}}>
<label style={Z.lb}>구독 티어</label>
<select value={se.tier} onChange={e=>up(p=>({...p,settings:{...p.settings,tier:parseInt(e.target.value)}}))} style={Z.sl}>
<option value={0}>Free (무료체험)</option>
<option value={1}>Tablet ($10/월, 1000 Anlas)</option>
<option value={2}>Scroll ($15/월, 1000 Anlas)</option>
<option value={3}>Opus ($25/월, 10000 Anlas)</option>
</select>
</div>
<div style={{flex:1,minWidth:100}}>
<label style={Z.lb}>현재 Anlas 잔액</label>
<input type="number" min={0} value={se.anlasBalance} onChange={e=>up(p=>({...p,settings:{...p.settings,anlasBalance:parseInt(e.target.value)||0}}))} style={{...Z.ip,fontFamily:"'JetBrains Mono',monospace",fontSize:11}}/>
</div>
</div>
<div style={{fontSize:9,color:"#666",marginTop:-6}}>
{se.tier>=3?"Opus: 1MP 이하 + 28 Steps 이하 = 무료 생성":"NovelAI 사이트에서 잔액을 확인하고 수동 입력하세요"}
{se.apiToken&&" · CORS로 API 조회가 안 될 경우 수동으로 관리"}
</div>
{/* API auto-fetch (if available) */}
{se.apiToken&&anlas!==null&&typeof anlas.anlas==="number"&&<div style={{display:"flex",alignItems:"center",gap:8}}>
<div style={{fontSize:9,color:"#5a5"}}>✓ API 조회: {anlas.anlas.toLocaleString()} Anlas</div>
<button onClick={()=>{up(p=>({...p,settings:{...p.settings,anlasBalance:anlas.anlas}}));tw("잔액 동기화!")}} style={{...Z.hB,fontSize:9,padding:"2px 8px"}}>↙ 동기화</button>
<button onClick={()=>fetchAnlas(se.apiToken).then(r=>{sAnlas(r);tw("갱신!")})} style={{...Z.hB,fontSize:9,padding:"2px 8px"}}>↻ 갱신</button>
</div>}
<div style={{fontSize:9,color:"#666"}}>생성 기록: {history.length}건</div>
<div style={{height:1,background:"rgba(255,255,255,.06)"}}/>
<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
<div style={{flex:1,minWidth:140}}><label style={Z.lb}>모델</label><select value={se.model} onChange={e=>up(p=>({...p,settings:{...p.settings,model:e.target.value}}))} style={Z.sl}>{MO.map(m=><option key={m.v} value={m.v}>{m.l}</option>)}</select>
<div style={{fontSize:9,color:"#666",marginTop:2}}>API값: {se.model}</div></div>
<div style={{flex:1,minWidth:140}}><label style={Z.lb}>해상도</label><select value={`${se.width}x${se.height}`} onChange={e=>{const[w,h]=e.target.value.split("x").map(Number);up(p=>({...p,settings:{...p.settings,width:w,height:h}}))}} style={Z.sl}>{RE.map(r=><option key={`${r.w}x${r.h}`} value={`${r.w}x${r.h}`}>{r.l}</option>)}</select></div></div>
<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
<div style={{flex:1,minWidth:100}}><label style={Z.lb}>샘플러</label><select value={se.sampler} onChange={e=>up(p=>({...p,settings:{...p.settings,sampler:e.target.value}}))} style={Z.sl}>{SA.map(s=><option key={s.v} value={s.v}>{s.l}</option>)}</select></div>
<div style={{flex:1,minWidth:60}}><label style={Z.lb}>Steps</label><input type="number" min={1} max={50} value={se.steps} onChange={e=>up(p=>({...p,settings:{...p.settings,steps:parseInt(e.target.value)||28}}))} style={Z.ip}/></div>
<div style={{flex:1,minWidth:60}}><label style={Z.lb}>Guidance</label><input type="number" min={0} max={30} step={.5} value={se.scale} onChange={e=>up(p=>({...p,settings:{...p.settings,scale:parseFloat(e.target.value)||5}}))} style={Z.ip}/></div></div>
<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
<div style={{flex:1}}><label style={Z.lb}>Seed</label><input value={se.seed} onChange={e=>up(p=>({...p,settings:{...p.settings,seed:e.target.value}}))} placeholder="랜덤" style={{...Z.ip,fontFamily:"'JetBrains Mono',monospace",fontSize:11}}/></div>
<div style={{flex:1}}><label style={Z.lb}>포맷</label><select value={se.format} onChange={e=>up(p=>({...p,settings:{...p.settings,format:e.target.value}}))} style={Z.sl}><option value="png">PNG</option><option value="webp">WebP</option></select></div></div>
<div style={{display:"flex",gap:14}}>
<label style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",fontSize:11,color:"#aaa"}}><input type="checkbox" checked={se.smea} onChange={e=>up(p=>({...p,settings:{...p.settings,smea:e.target.checked}}))} style={{accentColor:"#785aff"}}/> SMEA</label>
<label style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",fontSize:11,color:"#aaa"}}><input type="checkbox" checked={se.smeaDyn} onChange={e=>up(p=>({...p,settings:{...p.settings,smeaDyn:e.target.checked}}))} style={{accentColor:"#785aff"}}/> SMEA+DYN</label></div>
<div style={{height:1,background:"rgba(255,255,255,.06)"}}/>
<div><label style={Z.lb}>기본 파일명</label><input value={se.defaultFilename} onChange={e=>up(p=>({...p,settings:{...p.settings,defaultFilename:e.target.value}}))} style={{...Z.ip,fontFamily:"'JetBrains Mono',monospace",fontSize:11}}/>
<div style={{fontSize:9,color:"#555",marginTop:2}}>{FS?"✓ 경로 기억됨":"⚠ File API 미지원"}</div></div>
<div><label style={{...Z.lb,marginBottom:5}}>데이터</label>
<div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
<button onClick={hEx} style={{...Z.hB,fontSize:9,padding:"3px 8px"}}>📥 내보내기</button>
<button onClick={hIm} style={{...Z.hB,fontSize:9,padding:"3px 8px"}}>📤 가져오기</button>
<button onClick={()=>{if(confirm("초기화?")){sD(DD());tw("초기화")}}} style={{...Z.hB,fontSize:9,padding:"3px 8px",background:"rgba(255,50,50,.1)",borderColor:"rgba(255,50,50,.3)",color:"#f88"}}>🗑 초기화</button></div></div>
</div></Mod>
</div>)}

const Z={
ov:{position:"fixed",inset:0,zIndex:999,background:"rgba(0,0,0,.6)",display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(3px)"},
mb:{background:"#16162a",border:"1px solid #2a2a4a",borderRadius:12,padding:"24px 28px",maxHeight:"85vh",maxHeight:"85dvh",overflowY:"auto",WebkitOverflowScrolling:"touch"},
hB:{background:"rgba(120,90,255,.15)",border:"1px solid rgba(120,90,255,.3)",borderRadius:6,padding:"6px 14px",color:"#b095ff",fontSize:12,fontWeight:600,cursor:"pointer",minHeight:36},
aV:{background:"none",border:"none",color:"#666",fontSize:10,cursor:"pointer",padding:"4px 3px",lineHeight:1,minWidth:28,minHeight:24,display:"inline-flex",alignItems:"center",justifyContent:"center"},
aH:{background:"none",border:"none",color:"#888",fontSize:12,cursor:"pointer",padding:"4px 6px",minWidth:32,minHeight:32,display:"inline-flex",alignItems:"center",justifyContent:"center"},
tB:{background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.08)",borderRadius:5,width:28,height:28,display:"inline-flex",alignItems:"center",justifyContent:"center",color:"#888",fontSize:12,cursor:"pointer",flexShrink:0},
pB:{background:"rgba(120,90,255,.12)",border:"1px solid rgba(120,90,255,.25)",borderRadius:5,width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",color:"#b095ff",fontSize:16,cursor:"pointer",fontWeight:700},
eH:{fontSize:11,color:"#444",padding:"8px 4px",textAlign:"center"},
lb:{fontSize:12,fontWeight:500,color:"#888",marginBottom:4,display:"block"},
ip:{background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"10px 12px",color:"#ddd",fontSize:14,outline:"none",width:"100%",boxSizing:"border-box"},
sl:{background:"#1a1a30",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,padding:"10px 12px",color:"#ddd",fontSize:14,outline:"none",width:"100%",boxSizing:"border-box",cursor:"pointer"},
sv:{background:"linear-gradient(135deg,#785aff,#9b6dff)",border:"none",borderRadius:8,padding:"12px 0",color:"#fff",fontSize:15,fontWeight:600,cursor:"pointer",minHeight:48},
};
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
